<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>שורשים | מרכז הצמיחה</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#070E09;
  --bg2:#0C1610;
  --card:#111C14;
  --card2:#162019;
  --border:rgba(34,197,94,.12);
  --border2:rgba(34,197,94,.22);
  --green:#22C55E;
  --green2:#16A34A;
  --green-glow:rgba(34,197,94,.18);
  --blue:#3B82F6;
  --gold:#F59E0B;
  --red:#EF4444;
  --orange:#F97316;
  --text:#E2F0E4;
  --text2:#8BAF90;
  --text3:#4E6E55;
  --sidebar-w:248px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:'Rubik',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Rubik',sans-serif}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── LOGIN ── */
#loginScreen{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.login-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.login-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.35;animation:orb 10s ease-in-out infinite alternate}
.o1{width:500px;height:500px;background:var(--green);top:-150px;right:-100px;animation-duration:12s}
.o2{width:350px;height:350px;background:var(--blue);bottom:-80px;left:5%;animation-delay:-4s}
.o3{width:280px;height:280px;background:var(--green2);top:40%;left:60%;animation-delay:-7s;animation-duration:9s}
@keyframes orb{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.1)}}

.login-card{
  position:relative;z-index:2;
  background:rgba(11,21,13,.85);
  border:1px solid var(--border2);
  backdrop-filter:blur(24px);
  border-radius:24px;
  padding:44px 40px;
  width:100%;max-width:420px;
  animation:fadeUp .5s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{
  width:64px;height:64px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  border-radius:18px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin-bottom:12px;
  box-shadow:0 8px 32px var(--green-glow);
}
.login-logo h1{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:var(--text)}
.login-logo p{color:var(--text2);font-size:.83rem;margin-top:4px}

.login-tabs{display:flex;background:rgba(255,255,255,.04);border-radius:12px;padding:3px;margin-bottom:24px}
.login-tab{flex:1;padding:9px;border:none;background:none;color:var(--text2);font-size:.82rem;font-weight:600;border-radius:10px;transition:all .2s}
.login-tab.active{background:var(--green);color:#000;box-shadow:0 4px 16px var(--green-glow)}

.lf-group{margin-bottom:16px}
.lf-label{display:block;color:var(--text2);font-size:.78rem;font-weight:600;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.lf-input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
  border-radius:12px;color:var(--text);font-size:.92rem;
  transition:border-color .2s,background .2s;outline:none;
}
.lf-input:focus{border-color:var(--green);background:rgba(34,197,94,.05)}
.lf-input::placeholder{color:var(--text3)}
.pwd-wrap{position:relative}
.pwd-wrap .lf-input{padding-left:44px}
.pwd-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:1rem;padding:4px}

.login-btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#000;font-weight:800;font-size:.95rem;
  border:none;border-radius:14px;letter-spacing:.3px;
  box-shadow:0 8px 28px var(--green-glow);
  transition:transform .2s,box-shadow .2s;
  margin-top:6px;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px var(--green-glow)}
.login-err{color:var(--red);font-size:.8rem;text-align:center;margin-top:10px;min-height:18px}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:0;right:0;bottom:0;
  width:var(--sidebar-w);
  background:var(--bg2);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:100;overflow-y:auto;
  transition:transform .3s ease;
}
.sb-logo{
  display:flex;align-items:center;gap:12px;
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  margin-bottom:8px;
}
.sb-logo-icon{
  width:38px;height:38px;min-width:38px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;box-shadow:0 4px 16px var(--green-glow);
}
.sb-logo-text{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:var(--text)}
.sb-logo-sub{font-size:.68rem;color:var(--text2);margin-top:1px}

.sb-section{
  font-size:.65rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;
  padding:12px 20px 6px;
}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;margin:1px 8px;
  border-radius:10px;color:var(--text2);
  font-size:.88rem;font-weight:500;cursor:pointer;
  transition:all .15s;position:relative;
}
.sb-item:hover{background:var(--green-glow);color:var(--text)}
.sb-item.active{background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(34,197,94,.08));color:var(--green);font-weight:600}
.sb-item.active::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--green);border-radius:2px 0 0 2px}
.sb-icon{font-size:1rem;width:20px;text-align:center}

.sb-user{
  margin-top:auto;padding:16px 20px;
  border-top:1px solid var(--border);
}
.sb-user-inner{display:flex;align-items:center;gap:10px}
.sb-avatar{
  width:36px;height:36px;min-width:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:700;color:#000;
  background:linear-gradient(135deg,var(--green),var(--green2));
}
.sb-user-name{font-size:.83rem;font-weight:600;color:var(--text)}
.sb-user-role{font-size:.7rem;color:var(--text3)}
.sb-logout{margin-top:10px;width:100%;padding:9px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red);border-radius:10px;font-size:.8rem;font-weight:600;transition:all .2s}
.sb-logout:hover{background:rgba(239,68,68,.2)}

/* ── MAIN ── */
#main{
  margin-right:var(--sidebar-w);
  min-height:100vh;
  display:flex;flex-direction:column;
}
.topbar{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 32px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.topbar-left{display:flex;align-items:center;gap:16px}
.menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.3rem;padding:6px}
.page-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--text)}
.page-sub{font-size:.78rem;color:var(--text2);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-date{font-size:.78rem;color:var(--text3)}

#content{padding:28px 32px;flex:1}

/* ── CARDS ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px 24px;
}
.card-title{font-size:.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:18px 20px;
  position:relative;overflow:hidden;transition:border-color .2s;
}
.kpi-card:hover{border-color:var(--border2)}
.kpi-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 14px 0 60px;opacity:.08}
.kpi-card.green::after{background:var(--green)}
.kpi-card.blue::after{background:var(--blue)}
.kpi-card.gold::after{background:var(--gold)}
.kpi-card.red::after{background:var(--red)}
.kpi-icon{font-size:1.4rem;margin-bottom:10px}
.kpi-val{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--text);line-height:1}
.kpi-label{font-size:.75rem;color:var(--text2);margin-top:6px;font-weight:500}
.kpi-change{font-size:.72rem;margin-top:8px;font-weight:600}
.kpi-change.up{color:var(--green)}
.kpi-change.dn{color:var(--red)}

/* ── PROGRESS BAR ── */
.prog{height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;border-radius:4px;background:var(--green);transition:width .8s ease}
.prog-fill.blue{background:var(--blue)}
.prog-fill.gold{background:var(--gold)}
.prog-fill.red{background:var(--red)}

/* ── GROWTH GAUGE ── */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.gauge-label{font-size:.7rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.gauge-score{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--green);line-height:1}

/* ── STUDENT TABLE ── */
.data-table{width:100%;border-collapse:separate;border-spacing:0 4px}
.data-table th{font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:8px 16px;text-align:right}
.data-table td{padding:12px 16px;background:var(--card);font-size:.88rem;vertical-align:middle}
.data-table tr td:first-child{border-radius:0 12px 12px 0}
.data-table tr td:last-child{border-radius:12px 0 0 12px}
.data-table tr:hover td{background:var(--card2);cursor:pointer}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
.badge.green{background:rgba(34,197,94,.12);color:var(--green)}
.badge.blue{background:rgba(59,130,246,.12);color:var(--blue)}
.badge.gold{background:rgba(245,158,11,.12);color:var(--gold)}
.badge.red{background:rgba(239,68,68,.12);color:var(--red)}
.badge.gray{background:rgba(255,255,255,.06);color:var(--text2)}

.avatar-circle{
  width:34px;height:34px;min-width:34px;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:.82rem;font-weight:800;color:#000;
}

/* ── MINI GAUGE (table) ── */
.mini-gauge{display:flex;align-items:center;gap:8px}
.mini-gauge-bar{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.mini-gauge-fill{height:100%;border-radius:4px;transition:width .6s ease}
.mini-gauge-val{font-size:.8rem;font-weight:700;min-width:24px;text-align:left}

/* ── SECTION GRID ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── STUDENT PROFILE ── */
.profile-hero{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border);
  border-radius:16px;padding:24px 28px;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:start;gap:20px;margin-bottom:20px;
}
.profile-avatar{
  width:72px;height:72px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;font-weight:800;color:#000;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.profile-name{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text)}
.profile-meta{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.profile-gauges{display:flex;gap:16px}

/* ── GOALS ── */
.goal-card{
  background:var(--card2);border:1px solid var(--border);
  border-radius:12px;padding:16px 18px;
  display:flex;flex-direction:column;gap:8px;
}
.goal-type{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.goal-text{font-size:.9rem;color:var(--text);line-height:1.5}
.goal-empty{color:var(--text3);font-style:italic;font-size:.85rem}

/* ── SESSION LOG ── */
.session-row{
  display:grid;grid-template-columns:80px 1fr 1fr 1fr 1fr auto;
  align-items:center;gap:12px;
  padding:12px 16px;background:var(--card);
  border-radius:12px;margin-bottom:6px;
  border:1px solid var(--border);
  transition:border-color .2s;
}
.session-row:hover{border-color:var(--border2)}
.session-date{font-size:.78rem;color:var(--text2);font-weight:600}
.score-dot{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:800;
}

/* ── FORM ELEMENTS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:.76rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-input{
  padding:11px 14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:.88rem;
  transition:border-color .2s,background .2s;outline:none;
}
.form-input:focus{border-color:var(--green);background:rgba(34,197,94,.04)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--card);color:var(--text)}

/* ── RATING BUTTONS ── */
.rating-btns{display:flex;gap:4px}
.rating-btn{
  width:36px;height:36px;border-radius:9px;border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:var(--text2);
  font-size:.82rem;font-weight:700;transition:all .15s;
}
.rating-btn:hover{border-color:var(--border2);color:var(--text)}
.rating-btn.sel{border-color:var(--green);background:rgba(34,197,94,.15);color:var(--green)}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;border-radius:10px;
  font-size:.84rem;font-weight:700;border:none;
  transition:all .2s;cursor:pointer;
}
.btn-primary{background:var(--green);color:#000;box-shadow:0 4px 16px var(--green-glow)}
.btn-primary:hover{background:var(--green2);transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,.1);border-color:var(--border2)}
.btn-sm{padding:7px 14px;font-size:.78rem}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}

/* ── MODAL ── */
#modal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
#modal.open{display:flex}
#modalBox{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;animation:fadeUp .25s ease}
.modal-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:20px}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1px solid var(--border2);
  padding:12px 24px;border-radius:12px;font-size:.85rem;font-weight:600;
  color:var(--text);opacity:0;transition:all .3s;z-index:9999;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.error{border-color:var(--red);color:var(--red)}
#toast.success{border-color:var(--green);color:var(--green)}

/* ── REPORT ── */
.report-card{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border);border-radius:16px;padding:24px;
}
.report-section{margin-bottom:20px}
.report-section-title{font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.report-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:.88rem;color:var(--text)}
.report-bullet{width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:7px;min-width:6px}

/* ── TABS ── */
.tab-nav{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab-btn{padding:10px 18px;background:none;border:none;color:var(--text2);font-size:.85rem;font-weight:600;cursor:pointer;position:relative;transition:color .2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{transform:translateX(100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-right:0}
  .menu-btn{display:block}
  #content{padding:20px 16px}
  .topbar{padding:0 16px}
  .two-col,.three-col{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .profile-hero{grid-template-columns:1fr;text-align:center}
  .profile-gauges{justify-content:center}
  .kpi-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){.kpi-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-bg">
    <div class="login-orb o1"></div>
    <div class="login-orb o2"></div>
    <div class="login-orb o3"></div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🌱</div>
      <h1>שורשים</h1>
      <p id="loginTitle">מרכז הצמיחה · כניסה לפורטל</p>
    </div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="setLoginTab('login')">כניסה</button>
      <button class="login-tab" onclick="setLoginTab('register')">הרשמה</button>
      <button class="login-tab" onclick="setLoginTab('forgot')">שכחתי</button>
    </div>
    <!-- Login -->
    <div id="loginForm">
      <div class="lf-group"><label class="lf-label">אימייל</label><input class="lf-input" id="loginEmail" type="email" placeholder="your@email.com" dir="ltr"/></div>
      <div class="lf-group"><label class="lf-label">סיסמה</label><div class="pwd-wrap"><input class="lf-input" id="loginPwd" type="password" placeholder="••••••••" dir="ltr"/><button type="button" class="pwd-toggle" onclick="togglePwd('loginPwd',this)">👁</button></div></div>
      <button class="login-btn" onclick="doLogin()">כניסה →</button>
    </div>
    <!-- Register -->
    <div id="registerForm" style="display:none">
      <div class="lf-group"><label class="lf-label">שם מלא</label><input class="lf-input" id="regName" type="text" placeholder="ישראל ישראלי"/></div>
      <div class="lf-group"><label class="lf-label">אימייל</label><input class="lf-input" id="regEmail" type="email" placeholder="your@email.com" dir="ltr"/></div>
      <div class="lf-group"><label class="lf-label">סיסמה</label><div class="pwd-wrap"><input class="lf-input" id="regPwd" type="password" placeholder="לפחות 8 תווים" dir="ltr"/><button type="button" class="pwd-toggle" onclick="togglePwd('regPwd',this)">👁</button></div></div>

<script>
const SU='https://iuzghbbccmiucixoayfz.supabase.co';
const SK='sb_publishable_Dqb9AJaCyVEGBiXLqEmwCw_Xy-XHjRP';
const sb=supabase.createClient(SU,SK,{auth:{persistSession:true,autoRefreshToken:true,storageKey:'shoreshim-portal-auth',detectSessionInUrl:true}});

let S={user:null,profile:null,data:{}};
let currentView='';

// ── Date ──
document.getElementById('topDate').textContent=new Date().toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// ── INIT ──
async function init(){
  sb.auth.onAuthStateChange((ev,session)=>{
    if(ev==='SIGNED_OUT'||ev==='USER_DELETED'){S={user:null,profile:null,data:{}};showLogin();}
    if(ev==='TOKEN_REFRESHED'&&session) S.user=session.user;
  });
  const {data:{session}}=await sb.auth.getSession();
  if(!session){showLogin();return;}
  await loadProfile(session.user);
}

async function loadProfile(user){
  S.user=user;
  const {data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  if(!p){
    await sb.from('profiles').upsert({id:user.id,role:'student',full_name:user.email});
    S.profile={role:'student',full_name:user.email};
  } else {
    if(p.is_active===false){await sb.auth.signOut();document.getElementById('loginErr').textContent='החשבון מושהה. פנה למנהל.';return;}
    S.profile=p;
  }
  hideLogin();renderShell();await routeToPortal();
}

// ── AUTH ──
function setLoginTab(t){
  const order=['login','register','forgot'];
  document.querySelectorAll('.login-tab').forEach((b,i)=>b.classList.toggle('active',order[i]===t));
  ['loginForm','registerForm','forgotForm'].forEach((id,i)=>document.getElementById(id).style.display=order[i]===t?'block':'none');
  document.getElementById('loginErr').textContent='';
}
async function doLogin(){
  const em=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPwd').value;
  const err=document.getElementById('loginErr');
  if(!em||!pw){err.textContent='נא למלא אימייל וסיסמה';return;}
  const {data,error}=await sb.auth.signInWithPassword({email:em,password:pw});
  if(error){err.textContent='אימייל או סיסמה שגויים';return;}
  await loadProfile(data.user);
}
async function doRegister(){
  const name=document.getElementById('regName').value.trim();
  const em=document.getElementById('regEmail').value.trim();
  const pw=document.getElementById('regPwd').value;
  const pw2=document.getElementById('regPwdConfirm').value;
  const err=document.getElementById('loginErr');
  const btn=document.getElementById('regBtn');
  if(!name||!em||!pw){err.textContent='יש למלא את כל השדות';return;}
  if(pw.length<8){err.textContent='סיסמה — לפחות 8 תווים';return;}
  if(pw!==pw2){err.textContent='הסיסמאות אינן תואמות';return;}
  btn.textContent='רושם...';btn.disabled=true;
  const {data,error}=await sb.auth.signUp({email:em,password:pw,options:{data:{full_name:name,role:'student'}}});
  if(error){err.textContent=error.message;btn.textContent='הרשמה →';btn.disabled=false;return;}
  await sb.from('profiles').upsert({id:data.user.id,full_name:name,role:'student'},{onConflict:'id'});
  err.style.color='var(--green)';err.textContent='✅ נרשמת! בדוק מייל לאישור.';
  btn.textContent='הרשמה →';btn.disabled=false;
  setTimeout(()=>setLoginTab('login'),3000);
}
async function doForgot(){
  const em=document.getElementById('forgotEmail').value.trim();
  const err=document.getElementById('loginErr');
  if(!em){err.textContent='הכנס כתובת אימייל';return;}
  const {error}=await sb.auth.resetPasswordForEmail(em);
  if(error){err.textContent=error.message;return;}
  err.style.color='var(--green)';err.textContent='✅ נשלח מייל לאיפוס סיסמה!';
}
async function doLogout(){await sb.auth.signOut();showLogin();}
function togglePwd(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈';}
function showLogin(){document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}
function hideLogin(){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';}

// ── SHELL ──
function renderShell(){
  const p=S.profile;
  const roleMap={admin:'מנהל מערכת',parent:'הורה',student:'תלמיד'};
  document.getElementById('sbName').textContent=p.full_name||S.user.email;
  document.getElementById('sbRole').textContent=roleMap[p.role]||p.role;
  document.getElementById('sbAvatar').textContent=(p.full_name||'?')[0];
  const nav=document.getElementById('sb-nav');

  else if(p.role==='parent') nav.innerHTML=parentNav();

}
function adminNav(){return`
  <div class="sb-section">ניהול</div>
  <div class="sb-item active" id="nav-dashboard" onclick="go('dashboard')"><span class="sb-icon">🏠</span>לוח בקרה</div>
  <div class="sb-item" id="nav-students" onclick="go('students')"><span class="sb-icon">🎒</span>תלמידים</div>
  <div class="sb-item" id="nav-session-log" onclick="go('session-log')"><span class="sb-icon">✍️</span>רישום שיעור</div>
  <div class="sb-item" id="nav-reports" onclick="go('reports')"><span class="sb-icon">📊</span>דוחות לצמיחה</div>

  <div class="sb-item" id="nav-leads" onclick="go('leads')"><span class="sb-icon">📬</span>פניות מהאתר</div>
  <div class="sb-item" id="nav-accounts" onclick="go('accounts')"><span class="sb-icon">🔑</span>חשבונות</div>
`;}
function parentNav(){return`
  <div class="sb-section">הילד שלי</div>
  <div class="sb-item active" id="nav-p-home" onclick="go('p-home')"><span class="sb-icon">🌱</span>מד הצמיחה</div>
  <div class="sb-item" id="nav-p-sessions" onclick="go('p-sessions')"><span class="sb-icon">📋</span>היסטוריית שיעורים</div>
  <div class="sb-item" id="nav-p-report" onclick="go('p-report')"><span class="sb-icon">📄</span>דוח התקדמות</div>
`;}
function studentNav(){return`
  <div class="sb-section">אזור אישי</div>
  <div class="sb-item active" id="nav-s-home" onclick="go('s-home')"><span class="sb-icon">🌱</span>הצמיחה שלי</div>
  <div class="sb-item" id="nav-s-goals" onclick="go('s-goals')"><span class="sb-icon">🎯</span>היעדים שלי</div>
`;}

// ── ROUTING ──
async function go(view){
  currentView=view;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const navEl=document.getElementById('nav-'+view);
  if(navEl) navEl.classList.add('active');
  if(window.innerWidth<768) document.getElementById('sidebar').classList.remove('open');
  await routeToPortal(view);
}
async function routeToPortal(view){
  view=view||currentView;
  const r=S.profile?.role;
  if(r==='admin'){
    const v=view||'dashboard';
    currentView=v;
    if(v==='dashboard') await renderAdminDashboard();
    else if(v==='students') await renderStudents();
    else if(v==='student-profile') await renderStudentProfile();
    else if(v==='session-log') await renderSessionLog();
    else if(v==='reports') await renderReports();
    else if(v==='leads') await renderLeads();
    else if(v==='accounts') await renderAccounts();
    else await renderAdminDashboard();
  } else if(r==='parent'){
    if(!S.data.child) await loadParentData();
    const v=view||'p-home';
    currentView=v;
    if(v==='p-home') renderParentHome();
    else if(v==='p-sessions') renderParentSessions();
    else if(v==='p-report') renderParentReport();
    else renderParentHome();
  } else {
    if(!S.data.student) await loadStudentData();
    const v=view||'s-home';
    currentView=v;
    if(v==='s-home') renderStudentHome();
    else if(v==='s-goals') renderStudentGoals();
    else renderStudentHome();
  }
}

function setPage(title,sub='',actions=''){

}
function setContent(html){document.getElementById('content').innerHTML=html;}

const COLORS=['#22C55E','#3B82F6','#F59E0B','#EC4899','#8B5CF6','#F97316','#06B6D4','#EF4444'];
function rndColor(){return COLORS[Math.floor(Math.random()*COLORS.length)];}
function avatarColor(name){return COLORS[(name||'').charCodeAt(0)%COLORS.length];}
function growthColor(v){return v>=7?'var(--green)':v>=4?'var(--gold)':'var(--red)';}

// ── GROWTH GAUGE SVG ──
function gaugeArc(val,max=10,size=100,label=''){
  const pct=Math.min(val/max,1);
  const r=size*.38;const cx=size/2;const cy=size*.58;
  const startAngle=Math.PI;const endAngle=2*Math.PI;
  const arcLen=Math.PI*r;
  const filled=pct*arcLen;
  const x1=cx+r*Math.cos(startAngle);const y1=cy+r*Math.sin(startAngle);
  const x2=cx+r*Math.cos(endAngle);const y2=cy+r*Math.sin(endAngle);
  const col=val>=7?'#22C55E':val>=4?'#F59E0B':'#EF4444';
  return `<svg width="${size}" height="${size*.7}" viewBox="0 0 ${size} ${size*.7}" style="overflow:visible">
    <path d="M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="${size*.09}" stroke-linecap="round"/>
    <path d="M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="${size*.09}" stroke-linecap="round"
      stroke-dasharray="${filled} ${arcLen}" style="filter:drop-shadow(0 0 6px ${col})"/>
    <text x="${cx}" y="${cy*.85}" text-anchor="middle" fill="${col}" font-size="${size*.24}" font-weight="800" font-family="Syne,sans-serif">${val}</text>
    ${label?`<text x="${cx}" y="${size*.68}" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="${size*.1}" font-family="Rubik,sans-serif">${label}</text>`:''}
  </svg>`;
}
function miniBar(val,max=10){
  const pct=(val/max)*100;
  const col=val>=7?'var(--green)':val>=4?'var(--gold)':'var(--red)';
  return `<div class="mini-gauge"><div class="mini-gauge-bar"><div class="mini-gauge-fill" style="width:${pct}%;background:${col}"></div></div><span class="mini-gauge-val" style="color:${col}">${val}</span></div>`;
}

// ── DATA LOADERS ──
async function loadAdminData(){
  const [students,groups,attendance,leads]=await Promise.all([
    sq(sb.from('students').select('*').eq('active',true).order('name')),
    sq(sb.from('groups').select('*').order('name')),
    sq(sb.from('attendance').select('*')),
    sq(sb.from('leads').select('*').order('created_at',{ascending:false}).limit(20)),
  ]);
  // Load growth data (graceful — table may not exist yet)
  const growthRes=await sq(sb.from('student_growth').select('*'));
  const goalsRes=await sq(sb.from('student_goals').select('*'));
  const sessionsRes=await sq(sb.from('student_sessions').select('*').order('session_date',{ascending:false}));
  S.data={
    students:students.data||[],
    groups:groups.data||[],
    attendance:attendance.data||[],
    leads:leads.data||[],
    growth:growthRes.data||[],
    goals:goalsRes.data||[],
    sessions:sessionsRes.data||[],
  };
}
async function loadParentData(){
  const uid=S.user.id;
  const {data:children}=await sb.from('students').select('*').eq('parent_user_id',uid);
  const child=children?.[0]||null;
  if(!child){S.data={child:null,sessions:[],goals:{}};return;}
  const [sessRes,goalsRes]=await Promise.all([
    sq(sb.from('student_sessions').select('*').eq('student_id',child.id).order('session_date',{ascending:false})),
    sq(sb.from('student_goals').select('*').eq('student_id',child.id).single()),
  ]);
  const growthRes=await sq(sb.from('student_growth').select('*').eq('student_id',child.id).order('created_at',{ascending:false}).limit(1));
  S.data={child,sessions:sessRes.data||[],goals:goalsRes.data||{},growth:growthRes.data?.[0]||null};
}
async function loadStudentData(){
  const uid=S.user.id;
  const {data:st}=await sb.from('students').select('*').eq('user_id',uid).single();
  if(!st){S.data={student:null,sessions:[],goals:{}};return;}
  const [sessRes,goalsRes]=await Promise.all([
    sq(sb.from('student_sessions').select('*').eq('student_id',st.id).order('session_date',{ascending:false})),
    sq(sb.from('student_goals').select('*').eq('student_id',st.id).single()),
  ]);
  const growthRes=await sq(sb.from('student_growth').select('*').eq('student_id',st.id).order('created_at',{ascending:false}).limit(1));
  S.data={student:st,sessions:sessRes.data||[],goals:goalsRes.data||{},growth:growthRes.data?.[0]||null};
}

function renderStudentRows(students){
  const D=S.data;
  if(!students.length) return`<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text2)">אין תלמידים עדיין</td></tr>`;
  return students.map(st=>{
    const g=D.growth?.filter(x=>x.student_id===st.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
    const sAtt=D.sessions?.filter(s=>s.student_id===st.id)||[];
    const rate=sAtt.length?Math.round(sAtt.filter(s=>s.attended).length/sAtt.length*100):null;
    const grp=D.groups?.find(x=>x.id===st.group_id);
    const overall=g?.overall_score?Math.round(g.overall_score*10)/10:null;
    return`<tr onclick="viewStudent('${st.id}')">
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="avatar-circle" style="background:${avatarColor(st.name)}">${(st.name||'?')[0]}</div>
        <div><div style="font-weight:600">${st.name||'—'}</div><div style="font-size:.72rem;color:var(--text2)">${st.grade||'—'} · ${fmt(st.join_date)}</div></div>
      </div></td>
      <td>${grp?`<span class="badge blue">${grp.name}</span>`:'<span class="badge gray">—</span>'}</td>
      <td>${g?miniBar(g.knowledge_score||0):'<span style="color:var(--text3);font-size:.78rem">—</span>'}</td>
      <td>${g?miniBar(g.confidence_score||0):'<span style="color:var(--text3);font-size:.78rem">—</span>'}</td>
      <td>${g?miniBar(g.motivation_score||0):'<span style="color:var(--text3);font-size:.78rem">—</span>'}</td>
      <td>${overall!==null?`<span style="font-family:Syne,sans-serif;font-size:1rem;font-weight:800;color:${growthColor(overall)}">${overall}</span>/<span style="color:var(--text3)">10</span>`:'<span style="color:var(--text3)">—</span>'}</td>
      <td>${rate!==null?`<span class="badge ${rate>=80?'green':rate>=60?'gold':'red'}">${rate}%</span>`:'<span class="badge gray">—</span>'}</td>
      <td onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="viewStudent('${st.id}')">צפה</button>
        <button class="btn btn-ghost btn-sm" onclick="openSessionForStudent('${st.id}')">✍️</button>
      </td>
    </tr>`;
  }).join('');
}
function filterStudents(){
  const q=document.getElementById('studSearch')?.value.toLowerCase()||'';
  const gf=document.getElementById('studFilter')?.value||'';
  const filtered=(S.data.students||[]).filter(s=>{
    const nameOk=!q||(s.name||'').toLowerCase().includes(q);
    const grpOk=!gf||s.group_id===gf;
    return nameOk&&grpOk;
  });
  const tbody=document.getElementById('studTbody');
  if(tbody) tbody.innerHTML=renderStudentRows(filtered);
}

function openGrowthModal(studentId){
  const st=S.data.students?.find(s=>s.id===studentId);
  const existing=S.data.growth?.filter(g=>g.student_id===studentId).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0]||{};
  openModal(`
  <div class="modal-title">📊 עדכון מדד הצמיחה — ${st?.name||''}</div>
  <div style="display:flex;flex-direction:column;gap:16px">
  ${[
    ['knowledge','📖 רמת ידע',existing.knowledge_score||5],
    ['confidence','💪 ביטחון עצמי',existing.confidence_score||5],
    ['motivation','🎯 מוטיבציה',existing.motivation_score||5],
    ['perseverance','🔄 התמדה',existing.perseverance_score||5],
    ['capability','🌟 מסוגלות',existing.capability_score||5],
  ].map(([key,label,def])=>`
  <div>
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span class="form-label">${label}</span>
      <span id="gv-${key}" style="font-weight:700;color:var(--green)">${def}</span>
    </div>
    <input type="range" min="1" max="10" value="${def}" class="form-input" style="padding:0;height:6px;accent-color:var(--green)"
      id="gr-${key}" oninput="document.getElementById('gv-${key}').textContent=this.value"/>
  </div>`).join('')}
  <div class="form-group">
    <label class="form-label">הערות</label>
    <textarea class="form-input" id="gr-notes" rows="2" placeholder="הערות על הסשן...">${existing.notes||''}</textarea>
  </div>
  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
    <button class="btn btn-secondary" onclick="closeModal()">ביטול</button>
    <button class="btn btn-primary" onclick="saveGrowth('${studentId}')">💾 שמור מדדים</button>
  </div>
  </div>
  `);
}
async function saveGrowth(studentId){
  const get=key=>parseInt(document.getElementById('gr-'+key)?.value||5);
  const k=get('knowledge'),c=get('confidence'),m=get('motivation'),p=get('perseverance'),cap=get('capability');
  const overall=(k+c+m+p+cap)/5;
  const notes=document.getElementById('gr-notes')?.value||'';
  const {error}=await sb.from('student_growth').insert({
    student_id:studentId,
    knowledge_score:k,confidence_score:c,motivation_score:m,
    perseverance_score:p,capability_score:cap,
    overall_score:Math.round(overall*10)/10,
    notes,created_at:new Date().toISOString()
  });
  if(error){toast('שגיאה בשמירה: '+error.message,'error');return;}
  toast('✅ מדדי הצמיחה עודכנו בהצלחה','success');
  closeModal();
  await loadAdminData();
  if(currentView==='student-profile') renderStudentProfile();
  else if(currentView==='students') renderStudents();
  else renderAdminDashboard();
}

  </div>`);
}
async function saveGoals(studentId){
  const data={
    student_id:studentId,
    academic_goal:document.getElementById('g-academic')?.value||'',
    personal_goal:document.getElementById('g-personal')?.value||'',
    developmental_goal:document.getElementById('g-developmental')?.value||'',
    updated_at:new Date().toISOString()
  };
  const existing=S.data.goals?.find(g=>g.student_id===studentId);
  let error;
  if(existing){({error}=await sb.from('student_goals').update(data).eq('student_id',studentId));}
  else{({error}=await sb.from('student_goals').insert(data));}
  if(error){toast('שגיאה: '+error.message,'error');return;}
  toast('✅ יעדים נשמרו','success');
  closeModal();
  await loadAdminData();
  if(currentView==='student-profile') renderStudentProfile();
}

async function previewReport(studentId){
  const D=S.data;
  const st=D.students?.find(s=>s.id===studentId);
  if(!st) return;
  const g=D.growth?.filter(x=>x.student_id===studentId).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0]||{};
  const goals=D.goals?.find(x=>x.student_id===studentId)||{};
  const sessions=D.sessions?.filter(s=>s.student_id===studentId)||[];
  const overall=g.overall_score||null;
  const attSessions=sessions.filter(s=>s.attended!==null);
  const attRate=attSessions.length?Math.round(attSessions.filter(s=>s.attended).length/attSessions.length*100):null;
  const recentSessions=sessions.slice(0,3);
  const dateStr=new Date().toLocaleDateString('he-IL',{year:'numeric',month:'long',day:'numeric'});

  document.getElementById('report-preview').innerHTML=`
  <div class="report-card">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-family:Syne,sans-serif;font-size:1.4rem;font-weight:800;color:var(--text)">${st.name}</div>
        <div style="color:var(--text2);font-size:.82rem;margin-top:4px">דוח התקדמות · ${dateStr}</div>
        <div style="color:var(--text2);font-size:.82rem">מרכז שורשים</div>
      </div>
      <div style="display:flex;gap:16px;align-items:center">
        ${overall?gaugeArc(overall,10,90,'מד צמיחה'):''}
        <button class="btn btn-primary btn-sm" onclick="printReport('${studentId}')">🖨️ הדפס</button>
      </div>
    </div>

    ${overall?`<div class="report-section">
      <div class="report-section-title">מדדי הצמיחה</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${[['📖 ידע',g.knowledge_score],['💪 ביטחון',g.confidence_score],['🎯 מוטיבציה',g.motivation_score],['🔄 התמדה',g.perseverance_score],['🌟 מסוגלות',g.capability_score]].map(([l,v])=>v?`
      <div style="background:var(--card);border-radius:10px;padding:10px 14px;border:1px solid var(--border)">
        <div style="font-size:.78rem;color:var(--text2);margin-bottom:6px">${l}</div>
        ${miniBar(v)}
      </div>`:'').join('')}
      </div>
    </div>`:''}

    ${(goals.academic_goal||goals.personal_goal||goals.developmental_goal)?`
    <div class="report-section">
      <div class="report-section-title">יעדים אישיים</div>
      ${goals.academic_goal?`<div class="report-item"><div class="report-bullet"></div><span><strong>לימודי:</strong> ${goals.academic_goal}</span></div>`:''}
      ${goals.personal_goal?`<div class="report-item"><div class="report-bullet"></div><span><strong>אישי:</strong> ${goals.personal_goal}</span></div>`:''}
      ${goals.developmental_goal?`<div class="report-item"><div class="report-bullet"></div><span><strong>התפתחותי:</strong> ${goals.developmental_goal}</span></div>`:''}
    </div>`:''}

    ${attRate!==null?`
    <div class="report-section">
      <div class="report-section-title">נוכחות</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <span class="badge ${attRate>=80?'green':attRate>=60?'gold':'red'}" style="font-size:.85rem">${attRate}%</span>
        <span style="font-size:.83rem;color:var(--text2)">${attSessions.filter(s=>s.attended).length} מתוך ${attSessions.length} שיעורים</span>
      </div>
      <div class="prog"><div class="prog-fill ${attRate>=80?'':attRate>=60?'gold':'red'}" style="width:${attRate}%"></div></div>
    </div>`:''}

    ${recentSessions.length?`
    <div class="report-section">
      <div class="report-section-title">מפגשים אחרונים</div>
      ${recentSessions.map(s=>`
      <div style="background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:8px;border:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:.8rem;font-weight:600">${fmt(s.session_date)}</span>
          ${s.attended?'<span class="badge green" style="font-size:.68rem">נכח</span>':'<span class="badge red" style="font-size:.68rem">נעדר</span>'}
        </div>
        ${s.notes?`<div style="font-size:.8rem;color:var(--text2)">${s.notes}</div>`:''}
      </div>`).join('')}
    </div>`:''}
  </div>`;

    ${[['📚','לימודי',goals.academic_goal,'var(--blue)','לימודי'],['💚','אישי',goals.personal_goal,'var(--green)','אישי'],['🌱','התפתחותי',goals.developmental_goal,'var(--gold)','התפתחותי']].map(([icon,label,text,color,key])=>`
    <div class="goal-card">
      <div class="goal-type" style="color:${color}">${icon} יעד ${label}</div>
      ${text?`<div class="goal-text">${text}</div>`:`<div class="goal-empty">ממתין להגדרה על ידי המדריך</div>`}
    </div>`).join('')}
    </div>
  </div>`);
}

//  PRINT REPORT
// ══════════════════════════════════════
function printReport(studentId){window.print();}

// ── MISC ──
function toggleMenu(){document.getElementById('sidebar').classList.toggle('open');}
document.addEventListener('click',e=>{
  const sidebar=document.getElementById('sidebar');
  if(window.innerWidth<768&&sidebar.classList.contains('open')&&!sidebar.contains(e.target)&&!e.target.closest('.menu-btn')){sidebar.classList.remove('open');}
});

// ── START ──
init();
</script>
