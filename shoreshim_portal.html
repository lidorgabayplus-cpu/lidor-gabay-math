<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>שורשים | פורטל</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --dk:#06091E;--dk2:#0D1340;--bl:#3A5BF0;--bl2:#6B8EFF;
  --cy:#00D4E8;--li:#C1FF00;--rd:#FF4D6D;--or:#FF9A3C;
  --gr:#2ECC71;--tx:#12172E;--mid:#4A5178;--lgt:#8890B5;
  --bg:#F4F6FF;--wh:#fff;--brd:rgba(58,91,240,0.12);
  --glass:rgba(255,255,255,0.7);
  --shadow:0 4px 24px rgba(58,91,240,0.08);
  --shadow-lg:0 12px 48px rgba(58,91,240,0.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;min-height:100vh}
button{font-family:'Rubik',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Rubik',sans-serif}
a{text-decoration:none}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bl);border-radius:3px}

/* ═══════════════════════════════
   LOGIN SCREEN
═══════════════════════════════ */
#loginScreen{
  position:fixed;inset:0;z-index:1000;
  background:var(--dk);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0;
}
#loginScreen .aurora{position:absolute;inset:0;overflow:hidden;pointer-events:none}
#loginScreen .blob{position:absolute;border-radius:50%;filter:blur(80px);animation:bfloat 8s ease-in-out infinite alternate}
#loginScreen .b1{width:500px;height:500px;background:radial-gradient(circle,rgba(58,91,240,.3),transparent 70%);top:-100px;right:-100px}
#loginScreen .b2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,212,232,.2),transparent 70%);bottom:-50px;left:10%;animation-duration:11s;animation-delay:-3s}
@keyframes bfloat{from{transform:translate(0,0)}to{transform:translate(30px,25px)}}

.login-box{
  position:relative;z-index:2;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  border-radius:28px;
  padding:48px 44px;
  width:100%;max-width:440px;
  animation:fadeUp .6s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.login-logo{text-align:center;margin-bottom:32px}
.login-logo img{height:56px;margin-bottom:12px}
.login-logo h1{color:#fff;font-size:1.8rem;font-weight:900}
.login-logo p{color:rgba(255,255,255,.4);font-size:.85rem;margin-top:4px}

.login-tabs{display:flex;background:rgba(255,255,255,.06);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px}
.login-tab{flex:1;padding:10px;border:none;background:none;color:rgba(255,255,255,.5);font-size:.85rem;font-weight:600;border-radius:9px;transition:all .2s}
.login-tab.active{background:var(--bl);color:#fff;box-shadow:0 4px 16px rgba(58,91,240,.4)}

.lf-group{margin-bottom:20px}
.lf-label{display:block;color:rgba(255,255,255,.6);font-size:.82rem;font-weight:600;margin-bottom:8px}
.lf-input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;color:#fff;font-size:.95rem;
  transition:border-color .2s;outline:none;
}
.lf-input:focus{border-color:var(--bl)}
.lf-input::placeholder{color:rgba(255,255,255,.3)}

.login-btn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--bl),var(--cy));
  color:#fff;font-weight:700;font-size:1rem;
  border:none;border-radius:14px;
  box-shadow:0 8px 28px rgba(58,91,240,.4);
  transition:transform .2s,box-shadow .2s;
  margin-top:8px;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(58,91,240,.5)}
.login-err{color:#FF4D6D;font-size:.82rem;text-align:center;margin-top:12px;min-height:20px}

/* ═══════════════════════════════
   APP SHELL (after login)
═══════════════════════════════ */
#app{display:none;min-height:100vh}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:0;right:0;bottom:0;
  width:260px;
  background:var(--wh);
  border-left:1px solid var(--brd);
  display:flex;flex-direction:column;
  z-index:100;
  transition:transform .3s ease;
  box-shadow: 2px 0 24px rgba(58,91,240,0.06);
}
.sb-logo{padding:24px 20px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.sb-logo img{height:36px}
.sb-logo-text{font-size:1rem;font-weight:800;color:var(--tx)}
.sb-logo-sub{font-size:.7rem;color:var(--lgt);font-weight:400}

.sb-user{padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.sb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0}
.sb-user-name{font-size:.88rem;font-weight:600;color:var(--tx)}
.sb-user-role{font-size:.72rem;color:var(--lgt)}

.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-section{font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--lgt);padding:12px 10px 6px;text-transform:uppercase}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  font-size:.88rem;font-weight:500;color:var(--mid);
  cursor:pointer;transition:all .2s;margin-bottom:2px;
}
.sb-item:hover{background:var(--bg);color:var(--tx)}
.sb-item.active{background:rgba(58,91,240,.08);color:var(--bl);font-weight:700}
.sb-item .icon{font-size:1.1rem;width:20px;text-align:center}
.sb-item .badge{margin-right:auto;background:var(--rd);color:#fff;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:100px}

.sb-footer{padding:16px 20px;border-top:1px solid var(--brd)}
.sb-logout{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:.85rem;font-weight:500;color:var(--lgt);cursor:pointer;transition:all .2s;background:none;border:none;width:100%}
.sb-logout:hover{background:rgba(255,77,109,.08);color:var(--rd)}

/* ── MAIN CONTENT ── */
#main{
  margin-right:260px;
  min-height:100vh;
  display:flex;flex-direction:column;
}
.page-header{
  padding:24px 32px;
  background:var(--wh);
  border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.page-title{font-size:1.3rem;font-weight:800;color:var(--tx)}
.page-sub{font-size:.82rem;color:var(--lgt);margin-top:2px}
.page-actions{display:flex;gap:10px;align-items:center}

.content{padding:28px 32px;flex:1}

/* ── CARDS ── */
.card{background:var(--wh);border:1px solid var(--brd);border-radius:16px;padding:24px;box-shadow:var(--shadow)}
.card-sm{background:var(--wh);border:1px solid var(--brd);border-radius:12px;padding:16px;box-shadow:var(--shadow)}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--wh);border:1px solid var(--brd);border-radius:16px;padding:20px;box-shadow:var(--shadow);transition:transform .2s}
.kpi:hover{transform:translateY(-2px)}
.kpi-val{font-size:2rem;font-weight:900;color:var(--tx);line-height:1}
.kpi-label{font-size:.78rem;color:var(--lgt);margin-top:6px;font-weight:500}
.kpi-change{font-size:.75rem;font-weight:600;margin-top:8px}
.kpi-change.up{color:var(--gr)}
.kpi-change.down{color:var(--rd)}
.kpi-icon{font-size:1.6rem;margin-bottom:8px}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:right;font-size:.75rem;font-weight:700;color:var(--lgt);border-bottom:1px solid var(--brd);white-space:nowrap}
td{padding:12px 14px;font-size:.88rem;border-bottom:1px solid rgba(58,91,240,.05);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:.85rem;font-weight:700;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--bl);color:#fff;box-shadow:0 4px 16px rgba(58,91,240,.3)}
.btn-primary:hover{background:#2a4bd0;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid var(--brd)}
.btn-ghost:hover{background:var(--bg);color:var(--tx)}
.btn-danger{background:rgba(255,77,109,.1);color:var(--rd);border:1px solid rgba(255,77,109,.2)}
.btn-danger:hover{background:var(--rd);color:#fff}
.btn-success{background:rgba(46,204,113,.1);color:var(--gr);border:1px solid rgba(46,204,113,.2)}
.btn-success:hover{background:var(--gr);color:#fff}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:8px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:700}
.badge-blue{background:rgba(58,91,240,.1);color:var(--bl)}
.badge-green{background:rgba(46,204,113,.12);color:#27ae60}
.badge-red{background:rgba(255,77,109,.12);color:var(--rd)}
.badge-orange{background:rgba(255,154,60,.12);color:var(--or)}
.badge-gray{background:var(--bg);color:var(--mid)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(6,9,30,.6);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--wh);border-radius:20px;padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:fadeUp .3s ease}
.modal-h{font-size:1.2rem;font-weight:800;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:1.4rem;color:var(--lgt);cursor:pointer;padding:4px;line-height:1}
.modal-close:hover{color:var(--tx)}

/* ── FORMS ── */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.8rem;font-weight:700;color:var(--mid);margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;border:1.5px solid var(--brd);border-radius:10px;font-size:.9rem;outline:none;transition:border-color .2s;background:#fff;color:var(--tx)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--bl)}
.fg textarea{resize:vertical;min-height:80px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── ATTENDANCE GRID ── */
.att-grid{display:flex;flex-direction:column;gap:12px}
.att-row{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg);border-radius:12px}
.att-name{flex:1;font-size:.9rem;font-weight:600}
.att-toggle{display:flex;gap:8px}
.att-btn{width:36px;height:36px;border-radius:8px;border:none;font-size:.9rem;cursor:pointer;font-weight:700;transition:all .2s}
.att-btn.present{background:rgba(46,204,113,.15);color:var(--gr)}
.att-btn.absent{background:rgba(255,77,109,.15);color:var(--rd)}
.att-btn.active-present{background:var(--gr);color:#fff}
.att-btn.active-absent{background:var(--rd);color:#fff}
.att-fields{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.att-score{width:64px;padding:6px 8px;border:1.5px solid var(--brd);border-radius:8px;font-size:.85rem;text-align:center;outline:none}
.att-note{flex:1;min-width:120px;padding:6px 10px;border:1.5px solid var(--brd);border-radius:8px;font-size:.82rem;outline:none}

/* ── PROGRESS BAR ── */
.prog-bar{height:6px;background:var(--bg);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--bl),var(--cy));transition:width .8s ease}

/* ── RISK CARD ── */
.risk-card{display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,77,109,.06);border:1px solid rgba(255,77,109,.2);border-radius:12px;margin-bottom:10px}
.risk-icon{font-size:1.4rem}
.risk-name{font-size:.9rem;font-weight:700;color:var(--tx)}
.risk-reason{font-size:.78rem;color:var(--lgt)}

/* ── PARENT PORTAL ── */
.parent-hero{background:linear-gradient(135deg,var(--dk),var(--dk2));border-radius:20px;padding:32px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden}
.parent-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:24px 24px}
.parent-child-name{font-size:1.8rem;font-weight:900;position:relative}
.parent-child-group{font-size:.85rem;color:rgba(255,255,255,.5);margin-top:4px;position:relative}
.parent-stats{display:flex;gap:24px;margin-top:24px;position:relative}
.parent-stat{text-align:center}
.parent-stat-val{font-size:1.8rem;font-weight:900}
.parent-stat-lbl{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:2px}

/* ── STUDENT PORTAL ── */
.hw-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:10px;margin-bottom:8px}
.hw-cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--brd);cursor:pointer;transition:all .2s;flex-shrink:0}
.hw-cb.done{background:var(--gr);border-color:var(--gr)}
.hw-text{font-size:.88rem;flex:1}
.hw-text.done{text-decoration:line-through;color:var(--lgt)}
.hw-date{font-size:.72rem;color:var(--lgt)}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;position:relative}
.cal-day.present{background:rgba(46,204,113,.15);color:#27ae60}
.cal-day.absent{background:rgba(255,77,109,.1);color:var(--rd)}
.cal-day.no-lesson{background:var(--bg);color:var(--lgt)}
.cal-day.today{ring:2px solid var(--bl)}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:12px;margin-bottom:20px;width:fit-content}
.tab{padding:8px 18px;border-radius:9px;font-size:.85rem;font-weight:600;color:var(--mid);cursor:pointer;transition:all .2s;border:none;background:none}
.tab.active{background:var(--wh);color:var(--tx);box-shadow:var(--shadow)}

/* ── WEEK SCHEDULE ── */
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.week-col{}
.week-day-header{font-size:.78rem;font-weight:700;color:var(--lgt);text-align:center;padding:8px;background:var(--bg);border-radius:8px;margin-bottom:8px}
.week-lesson{background:var(--wh);border:1px solid var(--brd);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;border-right:3px solid var(--bl)}
.week-lesson:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.week-lesson .wl-group{font-size:.78rem;color:var(--bl);font-weight:700}
.week-lesson .wl-time{font-size:.82rem;color:var(--mid);margin-top:2px}
.week-lesson .wl-topic{font-size:.82rem;color:var(--tx);margin-top:4px;font-weight:500}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:16px;color:var(--lgt)}
.spinner{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
#toast{
  position:fixed;top:24px;left:24px;z-index:9999;
  background:var(--tx);color:#fff;
  padding:14px 22px;border-radius:14px;
  font-size:.9rem;font-weight:600;
  transform:translateY(-80px);opacity:0;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
  max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2);
}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:var(--gr)}
#toast.error{background:var(--rd)}
#toast.info{background:var(--bl)}

/* ── MOBILE ── */
#menuToggle{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--bl);color:#fff;border:none;border-radius:10px;padding:10px 12px;font-size:1.1rem}
@media(max-width:900px){
  #sidebar{transform:translateX(260px)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-right:0}
  #menuToggle{display:block}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .week-grid{grid-template-columns:repeat(2,1fr)}
  .fg-row{grid-template-columns:1fr}
}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 24px;color:var(--lgt)}
.empty .ei{font-size:3rem;margin-bottom:12px}
.empty p{font-size:.9rem}

/* ── CHART CONTAINER ── */
.chart-wrap{position:relative;height:220px}

/* ── ACCOUNT MGMT ── */
.acc-row{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg);border-radius:12px;margin-bottom:8px}
.acc-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0}
.acc-info{flex:1}
.acc-name{font-size:.9rem;font-weight:700}
.acc-email{font-size:.75rem;color:var(--lgt)}



/* ═══════════════════════════════════════════
   PORTAL MOBILE — CORRECT VERSION
   Structure: #sidebar=position:fixed right
              #main=margin-right:260px
═══════════════════════════════════════════ */
@media(max-width:768px){

  /* ── Login screen ── */
  .login-box{
    padding:24px 18px;
    margin:12px;
    width:calc(100% - 24px);
    max-width:100%;
    border-radius:20px;
  }
  .login-logo img{height:70px}
  .login-tabs{gap:2px}
  .login-tab{font-size:.78rem;padding:9px 4px}
  .lf-input{font-size:.9rem;padding:12px 14px}
  .login-btn{padding:14px;font-size:.95rem}

  /* ── Sidebar → bottom bar ── */
  #sidebar{
    top:auto !important;
    right:0 !important;
    left:0 !important;
    bottom:0 !important;
    width:100% !important;
    height:62px !important;
    flex-direction:row !important;
    border-left:none !important;
    border-top:1px solid var(--brd) !important;
    box-shadow:0 -4px 20px rgba(58,91,240,0.08) !important;
    overflow:hidden !important;
  }

  /* Hide sidebar parts not needed in bottom bar */
  .sb-logo,.sb-user,.sb-footer,.sb-section{display:none !important}

  /* Nav becomes horizontal scroller */
  .sb-nav{
    flex:1 !important;
    display:flex !important;
    flex-direction:row !important;
    overflow-x:auto !important;
    overflow-y:hidden !important;
    padding:4px 6px !important;
    gap:2px !important;
    scrollbar-width:none !important;
    align-items:center !important;
  }
  .sb-nav::-webkit-scrollbar{display:none}

  /* Nav items become icon+label columns */
  .sb-item{
    flex-direction:column !important;
    min-width:60px !important;
    max-width:72px !important;
    padding:6px 4px !important;
    gap:3px !important;
    font-size:.6rem !important;
    white-space:nowrap !important;
    border-radius:10px !important;
    align-items:center !important;
    text-align:center !important;
    flex-shrink:0 !important;
  }
  .sb-item .icon{font-size:1.3rem !important;width:auto !important}
  .sb-item .badge{display:none !important}

  /* Main content: remove right margin, add bottom padding */
  #main{
    margin-right:0 !important;
    padding-bottom:70px !important;
    min-height:100vh !important;
  }

  /* Page header */
  .page-header{
    padding:14px 16px !important;
    position:sticky;top:0;z-index:50;
  }
  .page-title{font-size:1.1rem !important}
  .page-sub{font-size:.75rem !important}
  .page-actions .btn{padding:7px 12px !important;font-size:.78rem !important}

  /* Content area */
  .content{padding:14px 14px !important}

  /* KPI grid: 2 columns */
  .kpi-grid{grid-template-columns:repeat(2,1fr) !important;gap:10px !important;margin-bottom:14px !important}
  .kpi{padding:14px 12px !important}
  .kpi-val{font-size:1.6rem !important}
  .kpi-icon{font-size:1.3rem !important;margin-bottom:4px !important}

  /* Tables */
  .tbl-wrap{overflow-x:auto !important;-webkit-overflow-scrolling:touch}
  table{min-width:520px}

  /* Cards */
  .card{padding:16px !important;border-radius:12px !important}
  .card-sm{padding:12px !important}

  /* Modal */
  .modal-box{
    width:calc(100vw - 24px) !important;
    max-height:88vh !important;
    overflow-y:auto !important;
    border-radius:20px !important;
    padding:20px 16px !important;
  }

  /* Charts */
  canvas{max-width:100% !important;height:200px !important}

  /* Grids → single column */
  .groups-grid,.student-cards,.accounts-list{grid-template-columns:1fr !important}

  /* Buttons row wrapping */
  .page-actions{flex-wrap:wrap;gap:6px}
  .btn{white-space:nowrap}
}

@media(max-width:400px){
  .kpi-grid{grid-template-columns:1fr 1fr !important}
  .sb-item{min-width:52px !important;font-size:.55rem !important}
  .content{padding:10px !important}
}

.shorshi-wrap{position:relative;width:140px;height:140px;margin:0 auto 16px}.shorshi-body{width:140px;height:140px;object-fit:contain;display:block;filter:drop-shadow(0 8px 24px rgba(58,91,240,0.5));transition:transform .08s ease-out}.pwd-wrap{position:relative}.pwd-wrap .lf-input{padding-left:44px}.pwd-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:1.1rem;padding:4px;line-height:1;transition:color .2s}.pwd-toggle:hover{color:rgba(255,255,255,.8)}
</style>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="aurora"><div class="blob b1"></div><div class="blob b2"></div></div>
  <div class="login-box">
    <div class="login-logo">
      <div class="shorshi-wrap" id="shorshiWrap"><img src="https://lidor-gabay-math.vercel.app/shorshi.png" alt="שורשי" class="shorshi-body" id="shorshiBody" onerror="this.style.opacity=0"/></div>

    </div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="setLoginTab('login')">כניסה</button>
      <button class="login-tab" onclick="setLoginTab('register')">הרשמה</button>
      <button class="login-tab" onclick="setLoginTab('forgot')">שכחתי סיסמה</button>
    </div>
    <div id="loginForm">
      <div class="lf-group">
        <label class="lf-label">אימייל</label>
        <input class="lf-input" type="email" id="loginEmail" placeholder="your@email.com"/>
      </div>
      <div class="lf-group">
        <label class="lf-label">סיסמה</label>
        <div class="pwd-wrap"><input class="lf-input" type="password" id="loginPwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/><button type="button" class="pwd-toggle" onclick="togglePwd('loginPwd',this)" tabindex="-1">👁</button></div>
      </div>
      <div class="lf-group" style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <input type="checkbox" id="rememberMe" style="width:18px;height:18px;cursor:pointer;accent-color:var(--bl)"/>
        <label for="rememberMe" style="color:rgba(255,255,255,.6);font-size:.84rem;cursor:pointer">זכור אותי</label>
      </div>
      <button class="login-btn" onclick="doLogin()" id="loginBtn">כניסה →</button>
      <div class="login-err" id="loginErr"></div>
    </div>
    <div id="registerForm" style="display:none">
      <div class="lf-group">
        <label class="lf-label">שם מלא</label>
        <input class="lf-input" type="text" id="regName" placeholder="ישראל ישראלי"/>
      </div>
      <div class="lf-group">
        <label class="lf-label">אימייל</label>
        <input class="lf-input" type="email" id="regEmail" placeholder="your@email.com"/>
      </div>
      <div class="lf-group">
        <label class="lf-label">סיסמה</label>
        <div class="pwd-wrap"><input class="lf-input" type="password" id="regPwd" placeholder="לפחות 8 תווים"/><button type="button" class="pwd-toggle" onclick="togglePwd('regPwd',this)" tabindex="-1">👁</button></div>
      </div>
      <!-- role selection removed for security — all new users get 'student', admin assigns roles manually -->
      <div class="lf-group"><label class="lf-label">אימות סיסמא</label><div class="pwd-wrap"><input class="lf-input" type="password" id="regPwdConfirm" placeholder="אימות סיסמא"/><button type="button" class="pwd-toggle" onclick="togglePwd('regPwdConfirm',this)" tabindex="-1">👁</button></div></div>
<button class="login-btn" onclick="doRegister()" id="regBtn">הרשמה →</button>
      <div class="login-err" id="regErr"></div>
    </div>
    <div id="forgotForm" style="display:none">
      <div class="lf-group">
        <label class="lf-label">אימייל</label>
        <input class="lf-input" type="email" id="forgotEmail" placeholder="your@email.com"/>
      </div>
      <button class="login-btn" onclick="doForgot()">שלח קישור איפוס →</button>
      <div class="login-err" id="forgotMsg"></div>
    </div>
  </div>
</div>

<script>
const SU='https://iuzghbbccmiucixoayfz.supabase.co';
const SK='sb_publishable_Dqb9AJaCyVEGBiXLqEmwCw_Xy-XHjRP';
const sb=supabase.createClient(SU,SK,{
  auth:{
    persistSession:true,
    autoRefreshToken:true,
    storageKey:'shoreshim-portal-auth',
    detectSessionInUrl:true
  }
});

// ─── STATE ───
let S={user:null,profile:null,data:{}};
let currentView='';

// ─── INIT ───
async function init(){
  // Listen to auth state changes — auto-refresh token, handle sign-out
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'||event==='USER_DELETED'){
      S={user:null,profile:null,data:{}};
      showLogin();
    }
    if(event==='TOKEN_REFRESHED'&&session){
      S.user=session.user;
    }
  });

  const {data:{session}}=await sb.auth.getSession();
  if(!session){showLogin();return;}
  await loadProfile(session.user);
}

async function loadProfile(user){
  S.user=user;
  const {data:p, error:pErr}=await sb.from('profiles').select('*').eq('id',user.id).single();
  if(pErr || !p){
    // פרופיל לא נמצא — נסה שוב פעם אחת
    await new Promise(r=>setTimeout(r,1000));
    const {data:p2}=await sb.from('profiles').select('*').eq('id',user.id).single();
    if(!p2){
      // עדיין לא נמצא — צור פרופיל חדש
      await sb.from('profiles').upsert({id:user.id,role:'student',full_name:user.email,is_active:true});
      S.profile={role:'student',full_name:user.email,is_active:true};
    } else {
      S.profile=p2;
    }
  } else {
    S.profile=p;
  }
  if(S.profile.is_active===false){
    await sb.auth.signOut();
    const err=document.getElementById('loginErr');
    if(err) err.textContent='החשבון שלך מושהה. פנה למנהל המרכז.';
    return;
  }
  hideLogin();
  renderShell();
  await routeToPortal();
}

// ─── AUTH ───
function setLoginTab(t){
  const tabs=document.querySelectorAll('.login-tab');
  const order=['login','register','forgot'];
  tabs.forEach((b,i)=>b.classList.toggle('active',order[i]===t));
  document.getElementById('loginForm').style.display=t==='login'?'block':'none';
  document.getElementById('registerForm').style.display=t==='register'?'block':'none';
  document.getElementById('forgotForm').style.display=t==='forgot'?'block':'none';
}

function selectRole(role){
  document.getElementById('roleParent').checked=role==='parent';
  document.getElementById('roleStudent').checked=role==='student';
  const active='border:2px solid var(--bl);color:var(--bl);font-weight:700;font-size:.9rem;transition:.2s;background:rgba(58,91,240,.12)';
  const inactive='border:2px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-weight:700;font-size:.9rem;transition:.2s';

async function doRegister(){

  const em=document.getElementById('regEmail').value.trim();
  const pw=document.getElementById('regPwd').value;
  const role='student'; // security: all self-registrations are students, admin assigns roles
  const err=document.getElementById('regErr');
  const btn=document.getElementById('regBtn');
  const pwC=document.getElementById('regPwdConfirm')?.value||'';
  if(!name||!em||!pw){err.textContent='יש למלא את כל השדות';return;}
  if(pw!==pwC){err.textContent='הסיסמאות אינן תואמות';return;}

  btn.textContent='רושם...';btn.disabled=true;err.textContent='';

  if(error){err.textContent=error.message==='User already registered'?'המייל כבר רשום במערכת':error.message;btn.textContent='הרשמה →';btn.disabled=false;return;}
  // Profile will be created by DB trigger — but upsert to be safe
  await sb.from('profiles').upsert({id:data.user.id,full_name:name,role:'student'},{ onConflict:'id' });
  err.style.color='var(--gr)';
  err.textContent='✅ נרשמת בהצלחה! בדוק את המייל שלך לאישור, ואז התחבר.';

function initShorshiTracker(){const b=document.getElementById("shorshiBody");if(!b)return;document.addEventListener("mousemove",e=>{const w=document.getElementById("shorshiWrap");if(!w)return;const rc=w.getBoundingClientRect(),cx=rc.left+rc.width/2,cy=rc.top+rc.height/2,dx=e.clientX-cx,dy=e.clientY-cy,a=Math.atan2(dy,dx),d=Math.min(Math.sqrt(dx*dx+dy*dy),400)/400;b.style.transform="rotate("+(Math.sin(a)*d*8)+"deg) translateY("+(-Math.cos(a)*d*5)+"px)";});}

// ─── ROUTER ───
async function go(view){
  currentView=view;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const navEl=document.getElementById('nav-'+view);
  if(navEl)navEl.classList.add('active');
  closeSidebar();
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><span>טוען...</span></div>';
  await routeToPortal(view);
}

async function routeToPortal(view){
  const role=S.profile.role;
  const v=view||currentView||(role==='admin'?'dashboard':role==='parent'?'p-dashboard':'s-dashboard');
  currentView=v;

  if(role==='admin'){
    if(v==='dashboard') await renderAdminDashboard();
    else if(v==='groups') await renderGroups();
    else if(v==='students') await renderStudents();
    else if(v==='schedule') await renderSchedule();
    else if(v==='reports') await renderReports();
    else if(v==='subscriptions') await renderSubscriptions();
    else if(v==='resources') await renderResources();
    else if(v==='accounts') await renderAccounts();
    else if(v==='leads') await renderLeads();
  } else if(role==='parent'){
    await loadParentData();
    if(v==='p-dashboard') renderParentDashboard();
    else if(v==='p-attendance') renderParentAttendance();
    else if(v==='p-progress') renderParentProgress();
    else if(v==='p-homework') renderParentHomework();
    else if(v==='p-report') renderParentReport();
  } else {
    await loadStudentData();
    if(v==='s-dashboard') renderStudentDashboard();
    else if(v==='s-schedule') renderStudentSchedule();
    else if(v==='s-progress') renderStudentProgress();
    else if(v==='s-homework') renderStudentHomework();
  }
}

// ─── DATA LOAD ───
async function safeQuery(query){try{const r=await query;return r;}catch(e){return {data:[],error:e};}}
async function loadAll(){
  const [g,st,l,a,r]=await Promise.all([
    safeQuery(sb.from('groups').select('*').order('created_at')),
    safeQuery(sb.from('students').select('*').eq('active',true).order('name')),
    safeQuery(sb.from('lessons').select('*').order('lesson_date,start_time')),
    safeQuery(sb.from('attendance').select('*')),
    safeQuery(sb.from('resources').select('*').order('created_at',{ascending:false})),
  ]);
  if(g.error) toast('שגיאה בטעינת קבוצות: '+(g.error.message||''), 'error');
  if(st.error) toast('שגיאה בטעינת תלמידים: '+(st.error.message||''), 'error');
  S.data={groups:g.data||[],students:st.data||[],lessons:l.data||[],attendance:a.data||[],resources:r.data||[]};
}

async function loadParentData(){
  const uid=S.user.id;
  const {data:children}=await sb.from('students').select('*').eq('parent_user_id',uid);
  if(!children||!children.length){S.data={children:[],lessons:[],attendance:[]};return;}
  const ids=children.map(c=>c.id);
  const gids=[...new Set(children.map(c=>c.group_id).filter(Boolean))];
  const [l,a]= await Promise.all([
    gids.length?sb.from('lessons').select('*').in('group_id',gids).order('lesson_date,start_time'):Promise.resolve({data:[]}),
    sb.from('attendance').select('*').in('student_id',ids),
  ]);
  const {data:groups}=await sb.from('groups').select('*').in('id',gids);
  S.data={children,lessons:l.data||[],attendance:a.data||[],groups:groups||[]};
}

async function loadStudentData(){
  const uid=S.user.id;
  const {data:st}=await sb.from('students').select('*').eq('user_id',uid).single();
  if(!st){S.data={student:null,lessons:[],attendance:[]};return;}
  const [l,a]=await Promise.all([
    st.group_id?sb.from('lessons').select('*').eq('group_id',st.group_id).order('lesson_date,start_time'):Promise.resolve({data:[]}),
    sb.from('attendance').select('*').eq('student_id',st.id),
  ]);
  const {data:grp}=st.group_id?await sb.from('groups').select('*').eq('id',st.group_id).single():{data:null};
  S.data={student:st,lessons:l.data||[],attendance:a.data||[],group:grp};
}

function fmt(d){if(!d)return'—';const dd=new Date(d);return dd.toLocaleDateString('he-IL');}
function fmtDate(d){if(!d)return'';return new Date(d).toISOString().split('T')[0];}
function today(){return new Date().toISOString().split('T')[0];}
function grpName(id){return (S.data.groups||[]).find(g=>g.id===id)?.name||'—';}
function stName(id){return (S.data.students||[]).find(s=>s.id===id)?.name||'—';}

function attRate(sid){if(!S.data.attendance)return 0;
  const a=S.data.attendance?.filter(a=>a.student_id===sid)||[];
  if(!a.length)return 0;
  return Math.round(a.filter(a=>a.present).length/a.length*100);
}
function avgScore(sid){if(!S.data.attendance)return null;
  const sc=S.data.attendance?.filter(a=>a.student_id===sid&&a.score!=null).map(a=>a.score)||[];
  if(!sc.length)return null;
  return Math.round(sc.reduce((a,b)=>a+b,0)/sc.length);
}
function riskLevel(sid){if(!S.data.attendance)return "low";
  const rate=attRate(sid);
  const sc=avgScore(sid);
  if(rate<60)return 'high';
  if(rate<80||sc<60)return 'medium';
  return 'low';
}

  <div class="fg"><label>שם הקבוצה</label><input id="gName" value="${g.name||''}"/></div>
  <div class="fg"><label>תיאור</label><input id="gDesc" value="${g.description||''}"/></div>
  <div class="fg-row">
    <div class="fg"><label>שיעורים לחודש</label><input id="gLpm" type="number" value="${g.lessons_per_month||8}"/></div>
    <div class="fg"><label>שעת שיעור</label><input id="gTime" type="time" value="${g.start_time||g.schedule_time||''}"/></div>
  </div>
  <div class="fg"><label>ימים קבועים</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      ${DAYS.map(d=>`<label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.85rem">
        <input type="checkbox" value="${d}" ${selDays.includes(d)?'checked':''} class="day-cb"/> ${d}</label>`).join('')}
    </div>
  </div>
  <div class="fg"><label>צבע</label><input id="gColor" type="color" value="${g.color||'#3A5BF0'}" style="width:100%;height:44px;padding:2px;border-radius:8px;border:1.5px solid var(--brd)"/></div>
  <div style="display:flex;gap:10px;margin-top:8px">
    <button class="btn btn-primary" style="flex:1" onclick="saveGroup(${id?`'${id}'`:'null'})">שמור</button>
    <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
  </div>`);
}

async function saveGroup(id){
  // schedule_days is text[] in Supabase — send as array
  const daysArr=[...document.querySelectorAll('.day-cb:checked')].map(c=>c.value);
  const obj={
    name:document.getElementById('gName').value.trim(),
    description:document.getElementById('gDesc').value.trim(),
    lessons_per_month:parseInt(document.getElementById('gLpm').value)||8,
    start_time:document.getElementById('gTime').value||null,
    schedule_days:daysArr,
    color:document.getElementById('gColor').value
  };
  if(!obj.name){toast('שם הקבוצה חובה','error');return;}
  let err;
  if(id){({error:err}=await sb.from('groups').update(obj).eq('id',id));}
  else{({error:err}=await sb.from('groups').insert(obj));}
  if(err){toast('שגיאה: '+err.message,'error');return;}
  closeModal();toast('✓ קבוצה נשמרה','success');await renderGroups();
}

async function delGroup(id){
  if(!confirm('למחוק קבוצה זו?'))return;
  const {error}=await sb.from('groups').delete().eq('id',id);
  if(error){toast('שגיאה: '+error.message,'error');return;}
  toast('קבוצה נמחקה');await renderGroups();
}
</script>
<script>
// ══════════════════════════════════════
//  ADMIN — STUDENTS
// ══════════════════════════════════════
async function renderStudents(){
  await loadAll();const D=S.data;
  setPage('תלמידים',`${D.students.length} תלמידים פעילים`,`<button class="btn btn-primary" onclick="openStudentModal()">+ תלמיד חדש</button>`);
  setContent(`
  <div class="card">
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <input id="stSearch" placeholder="חיפוש תלמיד..." style="flex:1;padding:10px 14px;border:1.5px solid var(--brd);border-radius:10px;font-size:.9rem;outline:none" oninput="filterStudents()"/>
      <select id="stGrpFilter" style="padding:10px 14px;border:1.5px solid var(--brd);border-radius:10px;font-size:.9rem;outline:none" onchange="filterStudents()">
        <option value="">כל הקבוצות</option>
        ${D.groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}
      </select>
    </div>
    <div class="tbl-wrap">
      <table id="stTable">
        <thead><tr><th>שם</th><th>קבוצה</th><th>כיתה</th><th>נוכחות</th><th>ציון ממוצע</th><th>מנוי</th><th>סטטוס</th><th>פעולות</th></tr></thead>
        <tbody id="stBody">${renderStudentRows(D.students)}</tbody>
      </table>
    </div>
  </div>`);
}

function renderStudentRows(students){
  return students.map(s=>{
    const rate=attRate(s.id);
    const sc=avgScore(s.id);
    const risk=riskLevel(s.id);
    const riskBadge=risk==='high'?'<span class="badge badge-red">⚠️ בסיכון</span>':risk==='medium'?'<span class="badge badge-orange">⚡ מעקב</span>':'<span class="badge badge-green">✓ תקין</span>';
    return`<tr>
      <td><strong>${s.name}</strong>${s.join_date?`<div style="font-size:.72rem;color:var(--lgt)">הצטרף: ${fmt(s.join_date)}</div>`:''}</td>
      <td>${grpName(s.group_id)}</td>
      <td>${s.grade||'—'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="prog-bar" style="width:60px"><div class="prog-fill" style="width:${rate}%;background:${rate<60?'var(--rd)':rate<80?'var(--or)':'var(--gr)'}"></div></div>
          <span style="font-size:.82rem;font-weight:700">${rate}%</span>
        </div>
      </td>
      <td>${sc!=null?`<span style="font-weight:700;color:${sc<60?'var(--rd)':sc<75?'var(--or)':'var(--gr)'}">${sc}</span>`:'—'}</td>
      <td><span class="badge badge-blue">${s.subscription_type||'חודשי'}</span></td>
      <td>${riskBadge}</td>
      <td style="display:flex;gap:4px">
        <button class="btn btn-sm btn-ghost" onclick="openStudentProfile('${s.id}')">👁️</button>
        <button class="btn btn-sm btn-ghost" onclick="openStudentModal('${s.id}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="delStudent('${s.id}')">🗑️</button>
        ${s.parent_phone||s.phone?`<button class="btn btn-sm btn-success" onclick="openWhatsApp('${s.parent_phone||s.phone}','${s.name}')">📱</button>`:''}
      </td>
    </tr>`;}).join('')||'<tr><td colspan="8" style="text-align:center;color:var(--lgt);padding:32px">אין תלמידים</td></tr>';
}

function filterStudents(){
  const q=document.getElementById('stSearch')?.value.toLowerCase()||'';
  const gid=document.getElementById('stGrpFilter')?.value||'';
  const filtered=S.data.students.filter(s=>(s.name.toLowerCase().includes(q))&&(!gid||s.group_id===gid));
  const body=document.getElementById('stBody');
  if(body)body.innerHTML=renderStudentRows(filtered);
}

function openStudentModal(id){
  const s=id?S.data.students.find(x=>x.id===id):{};
  const D=S.data;
  openModal(`
  <div class="modal-h">${id?'עריכת':'תלמיד חדש'} <button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="fg-row">
    <div class="fg"><label>שם מלא</label><input id="sName" value="${s.name||''}"/></div>
    <div class="fg"><label>כיתה</label><input id="sGrade" value="${s.grade||''}"/></div>
  </div>
  <div class="fg"><label>קבוצה</label>
    <select id="sGrp">
      <option value="">ללא קבוצה</option>
      ${D.groups.map(g=>`<option value="${g.id}" ${s.group_id===g.id?'selected':''}>${g.name}</option>`).join('')}
    </select>
  </div>
  <div class="fg-row">
    <div class="fg"><label>שם הורה</label><input id="sParentName" value="${s.parent_name||''}"/></div>
    <div class="fg"><label>טלפון הורה</label><input id="sPhone" value="${s.parent_phone||''}"/></div>
  </div>
  <div class="fg-row">
    <div class="fg"><label>מקצוע / נושא</label><input id="sSubject" value="${s.subject||''}"/></div>
    <div class="fg"><label>סוג מנוי</label>
      <select id="sSub">
        <option ${s.subscription_type==='חודשי'?'selected':''}>חודשי</option>
        <option ${s.subscription_type==='שני'?'selected':''}>שני</option>
        <option ${s.subscription_type==='מסובסד'?'selected':''}>מסובסד</option>
      </select>
    </div>
  </div>
  <div class="fg-row">
    <div class="fg"><label>מחיר חודשי (₪)</label><input id="sPrice" type="number" value="${s.subscription_price||0}"/></div>
    <div class="fg"><label>חידוש מנוי</label><input id="sRenew" type="date" value="${s.subscription_renewal||''}"/></div>
  </div>
  <div class="fg"><label>הערות</label><textarea id="sNotes">${s.notes||''}</textarea></div>
  <div style="display:flex;gap:10px;margin-top:8px">
    <button class="btn btn-primary" style="flex:1" onclick="saveStudent(${id?`'${id}'`:'null'})">שמור</button>
    <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
  </div>`);
}

async function saveStudent(id){
  const obj={
    name:document.getElementById('sName').value.trim(),
    grade:document.getElementById('sGrade').value.trim(),
    group_id:document.getElementById('sGrp').value||null,
    parent_name:document.getElementById('sParentName').value.trim(),
    parent_phone:document.getElementById('sPhone').value.trim(),
    subject:document.getElementById('sSubject').value.trim(),
    subscription_type:document.getElementById('sSub').value,
    subscription_price:parseInt(document.getElementById('sPrice').value)||0,
    subscription_renewal:document.getElementById('sRenew').value||null,
    notes:document.getElementById('sNotes').value.trim(),
    active:true,
  };
  if(!obj.name){toast('שם חובה','error');return;}
  let err;
  if(id){({error:err}=await sb.from('students').update(obj).eq('id',id));}
  else{({error:err}=await sb.from('students').insert(obj));}
  if(err){toast('שגיאה: '+err.message,'error');return;}
  closeModal();toast('✓ תלמיד נשמר','success');await renderStudents();
}

async function delStudent(id){
  if(!confirm('למחוק תלמיד זה?'))return;
  const {error}=await sb.from('students').update({active:false}).eq('id',id);
  if(error){toast('שגיאה: '+error.message,'error');return;}
  toast('תלמיד הוסר');await renderStudents();
}

function openStudentProfile(id){
  const s=S.data.students.find(x=>x.id===id);const D=S.data;
  const att=D.attendance.filter(a=>a.student_id===id);
  const pres=att.filter(a=>a.present);
  const scores=att.filter(a=>a.score!=null).map(a=>({score:a.score,date:D.lessons.find(l=>l.id===a.lesson_id)?.lesson_date})).sort((a,b)=>a.date>b.date?1:-1);
  openModal(`
  <div class="modal-h">${s.name} <button class="modal-close" onclick="closeModal()">×</button></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
    <div class="card-sm" style="text-align:center"><div style="font-size:1.6rem;font-weight:900">${attRate(id)}%</div><div style="font-size:.75rem;color:var(--lgt)">נוכחות</div></div>
    <div class="card-sm" style="text-align:center"><div style="font-size:1.6rem;font-weight:900">${avgScore(id)??'—'}</div><div style="font-size:.75rem;color:var(--lgt)">ציון ממוצע</div></div>
    <div class="card-sm" style="text-align:center"><div style="font-size:1.6rem;font-weight:900">${pres.length}</div><div style="font-size:.75rem;color:var(--lgt)">שיעורים</div></div>
  </div>
  ${scores.length?`<div style="height:140px;margin-bottom:16px"><canvas id="profileChart"></canvas></div>`:''}
  <div style="margin-bottom:12px"><strong>קבוצה:</strong> ${grpName(s.group_id)}</div>
  <div style="margin-bottom:12px"><strong>מנוי:</strong> ${s.subscription_type||'חודשי'} · ₪${s.subscription_price||0}/חודש</div>
  ${s.subscription_renewal?`<div style="margin-bottom:12px"><strong>חידוש:</strong> ${fmt(s.subscription_renewal)}</div>`:''}
  ${s.notes?`<div style="margin-bottom:12px"><strong>הערות:</strong> ${s.notes}</div>`:''}
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-primary btn-sm" onclick="closeModal();genReport('${id}')">📄 הפק דוח</button>
    <button class="btn btn-ghost btn-sm" onclick="closeModal();openStudentModal('${id}')">✏️ עריכה</button>
    ${s.parent_phone?`<button class="btn btn-success btn-sm" onclick="openWhatsApp('${s.parent_phone}','${s.name}')">📱 WhatsApp</button>`:''}
  </div>`);
  setTimeout(()=>{
    const ctx2=document.getElementById('profileChart')?.getContext('2d');
    if(ctx2&&scores.length){new Chart(ctx2,{type:'line',data:{labels:scores.map(x=>fmt(x.date)),datasets:[{data:scores.map(x=>x.score),borderColor:'#3A5BF0',backgroundColor:'rgba(58,91,240,.1)',borderWidth:2,pointRadius:4,tension:.4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100}}}});}
  },100);
}

function openWhatsApp(phone,name){
  if(!phone){toast('אין מספר טלפון','error');return;}
  const ph=phone.replace(/\D/g,'').replace(/^0/,'972');
  const msg=encodeURIComponent(`שלום, זה לידור ממרכז שורשים בנוגע ל${name}.`);
  window.open(`https://wa.me/${ph}?text=${msg}`,'_blank');
}
</script>
<script>
// ══════════════════════════════════════
//  ADMIN — SCHEDULE
// ══════════════════════════════════════
const DAYS_HE=['ראשון','שני','שלישי','רביעי','חמישי'];
let wOff=0;

async function renderSchedule(){
  await loadAll();
  setPage('לוח שבועי','ניהול שיעורים שבועיים',
    `<button class="btn btn-ghost" onclick="wOff--;renderSchedule()">← שבוע</button>
     <button class="btn btn-ghost" onclick="wOff=0;renderSchedule()">היום</button>
     <button class="btn btn-ghost" onclick="wOff++;renderSchedule()">שבוע →</button>
     <button class="btn btn-primary" onclick="genWeekLessons()">⚡ צור שיעורי שבוע</button>`);

  const ws=weekStart(wOff);
  const we=new Date(ws);we.setDate(we.getDate()+4);
  const label=`${fmtDate(ws)} — ${fmtDate(we)}`;
  document.getElementById('pageSub').textContent=label;

  const D=S.data;
  const weekDates=DAYS_HE.map((_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return fmtDate(d);});

  setContent(`
  <div class="week-grid">
    ${DAYS_HE.map((day,i)=>{
      const date=weekDates[i];
      const dayLessons=D.lessons.filter(l=>l.lesson_date===date).sort((a,b)=>a.start_time>b.start_time?1:-1);
      return`<div class="week-col">
        <div class="week-day-header" style="${date===today()?'background:rgba(58,91,240,.12);color:var(--bl)':''}">${day}<br><span style="font-size:.7rem;font-weight:400">${date}</span></div>
        ${dayLessons.map(l=>{
          const g=D.groups.find(g=>g.id===l.group_id);
          const att=D.attendance.filter(a=>a.lesson_id===l.id);
          const pres=att.filter(a=>a.present).length;
          const total=D.students.filter(s=>s.group_id===l.group_id).length;
          return`<div class="week-lesson" onclick="openLessonModal('${l.id}')" style="border-right-color:${g?.color||'var(--bl)'}">
            <div class="wl-group">${g?.name||'—'}</div>
            <div class="wl-time">${l.start_time||''}</div>
            ${l.topic?`<div class="wl-topic">${l.topic}</div>`:''}
            <div style="font-size:.72rem;color:var(--lgt);margin-top:4px">${pres}/${total} ✓</div>
          </div>`;}).join('')}
        <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:4px" onclick="openNewLessonModal('${date}')">+ שיעור</button>
      </div>`;}).join('')}
  </div>`);
}

function weekStart(off=0){
  const d=new Date();
  const day=d.getDay();
  d.setDate(d.getDate()-day+(off*7));
  return d;
}

async function genWeekLessons(){
  await loadAll();const D=S.data;
  const ws=weekStart(wOff);
  let created=0;
  for(const g of D.groups){
    const days=Array.isArray(g.schedule_days)?g.schedule_days:(g.schedule_days||'').split(',').filter(Boolean);
    for(let i=0;i<5;i++){
      const dayName=DAYS_HE[i];
      if(!days.includes(dayName))continue;
      const d=new Date(ws);d.setDate(d.getDate()+i);
      const dateStr=fmtDate(d);
      const exists=D.lessons.find(l=>l.group_id===g.id&&l.lesson_date===dateStr);
      if(exists)continue;
      const {data:lesson,error:lerr}=await sb.from('lessons').insert({group_id:g.id,lesson_date:dateStr,start_time:g.start_time||null,duration:90}).select().single();
      if(lerr){toast('שגיאה ביצירת שיעור: '+lerr.message,'error');continue;}
      if(lesson){
        const students=D.students.filter(s=>s.group_id===g.id);
        if(students.length)await sb.from('attendance').insert(students.map(s=>({lesson_id:lesson.id,student_id:s.id,present:true})));
        created++;
      }
    }
  }
  toast(`✓ נוצרו ${created} שיעורים`,'success');
  await renderSchedule();
}

function openNewLessonModal(date){
  const D=S.data;
  openModal(`
  <div class="modal-h">שיעור חדש — ${date} <button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="fg"><label>קבוצה</label>
    <select id="nlGrp">
      <option value="">בחר קבוצה</option>
      ${D.groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}
    </select>
  </div>
  <div class="fg-row">
    <div class="fg"><label>שעת התחלה</label><input id="nlTime" type="time"/></div>
    <div class="fg"><label>משך (דקות)</label><input id="nlDur" type="number" value="90"/></div>
  </div>
  <div class="fg"><label>נושא השיעור</label><input id="nlTopic" placeholder="אופציונלי"/></div>
  <div style="display:flex;gap:10px;margin-top:8px">
    <button class="btn btn-primary" style="flex:1" onclick="saveNewLesson('${date}')">צור שיעור</button>
    <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
  </div>`);
}

async function saveNewLesson(date){
  const gid=document.getElementById('nlGrp').value;
  if(!gid){toast('בחר קבוצה','error');return;}
  const {data:lesson}=await sb.from('lessons').insert({
    group_id:gid,lesson_date:date,
    start_time:document.getElementById('nlTime').value||null,
    duration:parseInt(document.getElementById('nlDur').value)||90,
    topic:document.getElementById('nlTopic').value.trim()||null
  }).select().single();
  if(lesson){
    const students=S.data.students.filter(s=>s.group_id===gid);
    if(students.length)await sb.from('attendance').insert(students.map(s=>({lesson_id:lesson.id,student_id:s.id,present:true})));
  }
  closeModal();toast('✓ שיעור נוצר','success');await renderSchedule();
}

async function openLessonModal(lid){
  await loadAll();const D=S.data;
  const l=D.lessons.find(x=>x.id===lid);if(!l)return;
  const g=D.groups.find(x=>x.id===l.group_id);
  const students=D.students.filter(s=>s.group_id===l.group_id);
  const attMap={};D.attendance.filter(a=>a.lesson_id===lid).forEach(a=>attMap[a.student_id]=a);

  openModal(`
  <div class="modal-h">${g?.name||'שיעור'} · ${fmt(l.lesson_date)} <button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="fg-row">
    <div class="fg"><label>נושא</label><input id="ltopic" value="${l.topic||''}"/></div>
    <div class="fg"><label>שעה</label><input id="ltime" type="time" value="${l.start_time||''}"/></div>
  </div>
  <div class="fg"><label>סיכום</label><textarea id="lsummary">${l.summary||''}</textarea></div>
  <button class="btn btn-ghost btn-sm" style="margin-bottom:16px" onclick="saveLessonMeta('${lid}')">שמור פרטי שיעור</button>

  <div style="font-size:.85rem;font-weight:700;color:var(--mid);margin-bottom:10px">נוכחות וציונים</div>
  <div class="att-grid" id="attGrid">
    ${students.map(s=>{
      const a=attMap[s.id]||{present:true};
      return`<div class="att-row">
        <div class="att-name">${s.name}</div>
        <div class="att-toggle">
          <button class="att-btn ${a.present?'active-present':'present'}" onclick="toggleAtt('${lid}','${s.id}',true,this)">✓</button>
          <button class="att-btn ${!a.present?'active-absent':'absent'}" onclick="toggleAtt('${lid}','${s.id}',false,this)">✗</button>
        </div>
        <div class="att-fields">
          <input class="att-score" type="number" min="0" max="100" placeholder="ציון" value="${a.score??''}" onchange="saveAttField('${lid}','${s.id}','score',this.value)" ${!a.present?'disabled':''}/>
          <input class="att-note" placeholder="הערה..." value="${a.notes||''}" onchange="saveAttField('${lid}','${s.id}','notes',this.value)" ${!a.present?'disabled':''}/>
          <input class="att-note" placeholder="שיעורי בית..." value="${a.homework||''}" onchange="saveAttField('${lid}','${s.id}','homework',this.value)" style="min-width:140px" ${!a.present?'disabled':''}/>
          <label style="font-size:.78rem;display:flex;align-items:center;gap:4px;cursor:pointer">
            <input type="checkbox" ${a.homework_done?'checked':''} onchange="saveAttField('${lid}','${s.id}','homework_done',this.checked)"/> הוגש
          </label>
        </div>
      </div>`;}).join('')||'<div class="empty"><p>אין תלמידים בקבוצה</p></div>'}
  </div>
  <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
    <button class="btn btn-danger btn-sm" onclick="delLesson('${lid}')">🗑️ מחק שיעור</button>
  </div>`);
}

async function saveLessonMeta(lid){
  await sb.from('lessons').update({topic:document.getElementById('ltopic').value.trim(),start_time:document.getElementById('ltime').value||null,summary:document.getElementById('lsummary').value.trim()}).eq('id',lid);
  toast('✓ נשמר','success');
}

async function toggleAtt(lid,sid,present,btn){
  const row=btn.closest('.att-row');
  row.querySelectorAll('.att-btn').forEach(b=>{b.classList.remove('active-present','active-absent');});
  btn.classList.add(present?'active-present':'active-absent');
  const inputs=row.querySelectorAll('.att-score,.att-note');
  inputs.forEach(i=>i.disabled=!present);
  const exists=S.data.attendance.find(a=>a.lesson_id===lid&&a.student_id===sid);
  if(exists){await sb.from('attendance').update({present}).eq('lesson_id',lid).eq('student_id',sid);}
  else{await sb.from('attendance').insert({lesson_id:lid,student_id:sid,present});}
  const idx=S.data.attendance.findIndex(a=>a.lesson_id===lid&&a.student_id===sid);
  if(idx>=0)S.data.attendance[idx].present=present;
  else S.data.attendance.push({lesson_id:lid,student_id:sid,present});
}

async function saveAttField(lid,sid,field,value){
  let val;
  if(field==='score') val=value===''?null:parseInt(value);
  else if(field==='homework_done') val=Boolean(value);
  else val=value;
  const exists=S.data.attendance.find(a=>a.lesson_id===lid&&a.student_id===sid);
  let err;
  if(exists){({error:err}=await sb.from('attendance').update({[field]:val}).eq('lesson_id',lid).eq('student_id',sid));}
  else{({error:err}=await sb.from('attendance').insert({lesson_id:lid,student_id:sid,present:true,[field]:val}));}
  if(err) toast('שגיאה בשמירה: '+err.message,'error');
}

async function delLesson(lid){
  if(!confirm('למחוק שיעור זה?'))return;
  await sb.from('attendance').delete().eq('lesson_id',lid);
  await sb.from('lessons').delete().eq('id',lid);
  closeModal();toast('שיעור נמחק');await renderSchedule();
}
</script>

async function exportLeadsCSV(){
  const {data:leads}=await sb.from('leads').select('*').order('created_at',{ascending:false});

  const rows=leads.map(l=>[
    new Date(l.created_at).toLocaleString('he-IL'),
    l.name,l.phone,l.city,l.num_kids,l.difficulty,l.budget,l.priorities,l.likelihood
  ]);
  const csv='﻿'+[headers,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');

  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='leads_'+today()+'.csv';
  a.click();
  toast('✓ CSV יוצא','success');

async function renderResources(){
  await loadAll();
  setPage('משאבים','ספריית קבצים ותבניות',`<button class="btn btn-primary" onclick="openResourceModal()">+ הוספת משאב</button>`);
  const D=S.data;
  setContent(`
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
    ${D.resources.map(r=>`<div class="card">
      <div style="font-size:1.8rem;margin-bottom:8px">${r.file_type?.includes('pdf')?'📄':r.file_type?.includes('image')?'🖼️':'📁'}</div>
      <div style="font-weight:700;margin-bottom:4px">${r.name}</div>
      ${r.description?`<div style="font-size:.8rem;color:var(--lgt);margin-bottom:8px">${r.description}</div>`:''}
      <span class="badge badge-gray">${r.category||'כללי'}</span>
      <div style="display:flex;gap:6px;margin-top:12px">
        ${r.file_path?`<a href="${r.file_path}" target="_blank" class="btn btn-sm btn-primary">⬇️ הורד</a>`:''}
        <button class="btn btn-sm btn-danger" onclick="delResource('${r.id}')">🗑️</button>
      </div>
    </div>`).join('')||'<div class="empty"><div class="ei">📁</div><p>אין משאבים עדיין</p></div>'}
  </div>`);
}

function openResourceModal(){
  openModal(`
  <div class="modal-h">משאב חדש <button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="fg"><label>שם</label><input id="rName" placeholder="שם המשאב"/></div>
  <div class="fg"><label>תיאור</label><input id="rDesc" placeholder="תיאור קצר"/></div>
  <div class="fg"><label>קטגוריה</label><input id="rCat" value="כללי"/></div>
  <div class="fg">
    <label>סוג קובץ</label>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button type="button" id="rTabUrl" onclick="switchResTab('url')"
        style="flex:1;padding:8px;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;background:var(--bl);color:#fff;border:none">🔗 קישור (URL)</button>
      <button type="button" id="rTabFile" onclick="switchResTab('file')"
        style="flex:1;padding:8px;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;background:var(--bg);color:var(--mid);border:1.5px solid var(--brd)">📎 העלאת קובץ</button>
    </div>
    <div id="rPanelUrl"><input id="rUrl" placeholder="https://..."/></div>
    <div id="rPanelFile" style="display:none">
      <input type="file" id="rFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.jpg,.jpeg,.png,.mp4,.zip"
        style="width:100%;padding:10px;border:1.5px dashed var(--brd);border-radius:10px;cursor:pointer;font-size:.88rem"/>
      <div id="rUploadStatus" style="font-size:.82rem;color:var(--mid);margin-top:6px;display:none"></div>
    </div>
  </div>
  <div style="display:flex;gap:10px;margin-top:8px">
    <button class="btn btn-primary" style="flex:1" onclick="saveResource()">שמור</button>
    <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
  </div>`);
}

function switchResTab(tab){
  const isUrl = tab==='url';
  document.getElementById('rPanelUrl').style.display = isUrl?'':'none';
  document.getElementById('rPanelFile').style.display = isUrl?'none':'';
  document.getElementById('rTabUrl').style.background = isUrl?'var(--bl)':'var(--bg)';
  document.getElementById('rTabUrl').style.color = isUrl?'#fff':'var(--mid)';
  document.getElementById('rTabUrl').style.border = isUrl?'none':'1.5px solid var(--brd)';
  document.getElementById('rTabFile').style.background = !isUrl?'var(--bl)':'var(--bg)';
  document.getElementById('rTabFile').style.color = !isUrl?'#fff':'var(--mid)';
  document.getElementById('rTabFile').style.border = !isUrl?'none':'1.5px solid var(--brd)';
}

async function saveResource(){
  const name = document.getElementById('rName').value.trim();
  const desc = document.getElementById('rDesc').value.trim();
  const cat  = document.getElementById('rCat').value.trim();
  if(!name){toast('שם חובה','error');return;}

  const isFileTab = document.getElementById('rPanelFile').style.display !== 'none';
  let filePath = '';
  let fileType = '';

  if(isFileTab){
    const fileInput = document.getElementById('rFile');
    const file = fileInput.files[0];
    if(!file){toast('בחר קובץ','error');return;}
    const status = document.getElementById('rUploadStatus');
    status.style.display='';
    status.textContent='⏳ מעלה קובץ...';
    const ext = file.name.split('.').pop().toLowerCase();
    fileType = ext;
    const path = `resources/${Date.now()}_${file.name.replace(/\s/g,'_')}`;
    const {data:up, error:upErr} = await sb.storage.from('shorashim-files').upload(path, file, {upsert:true});
    if(upErr){status.textContent='❌ '+upErr.message;return;}
    const {data:pub} = sb.storage.from('shorashim-files').getPublicUrl(path);
    filePath = pub.publicUrl;
    status.textContent='✓ הועלה בהצלחה';
  } else {
    filePath = document.getElementById('rUrl').value.trim();
    const ext = filePath.split('.').pop().split('?')[0].toLowerCase();
    fileType = ['pdf','doc','docx','ppt','pptx'].includes(ext)?ext:'link';
  }

  await sb.from('resources').insert({name, description:desc, category:cat, file_path:filePath, file_type:fileType});
  closeModal();toast('✓ משאב נשמר','success');await renderResources();
}

async function delResource(id){
  if(!confirm('למחוק?'))return;
  await sb.from('resources').delete().eq('id',id);
  toast('נמחק');await renderResources();
}
</script>
<script>
// ══════════════════════════════════════
//  ADMIN — ACCOUNTS (registration + roles)

async function renderAccounts(){
  await loadAll();
  const {data:profiles}=await sb.from('profiles').select('*').order('created_at',{ascending:false});
  setPage('ניהול חשבונות','הזמנת הורים ותלמידים למערכת',

      <br><strong>הורה</strong> — ישויך לתלמיד דרך לשונית "תלמידים" ← עריכת תלמיד ← אימייל הורה.

  <div class="card">

        <thead><tr><th>שם</th><th>תפקיד</th><th>סטטוס</th><th>שויך ל</th><th>שינוי תפקיד</th><th>פעולות</th></tr></thead>
        <tbody>
        ${(profiles||[]).map(p=>{
          const linked=p.role==='parent'?S.data.students.filter(s=>s.parent_user_id===p.id).map(s=>s.name).join(', '):

          return`<tr style="${isBlocked?'opacity:.55':''}">

                <strong>${p.full_name||'—'}</strong>
              </div>
            </td>
            <td><span class="badge ${roleColor[p.role]||'badge-gray'}">${roleLabel[p.role]||p.role}</span></td>
            <td>${isBlocked?'<span class="badge badge-red">חסום</span>':'<span class="badge badge-green">פעיל</span>'}</td>
            <td style="font-size:.82rem">${linked||'—'}</td>
            <td>
              <select onchange="changeRole('${p.id}',this.value)" style="padding:6px 10px;border:1.5px solid var(--brd);border-radius:8px;font-size:.82rem;outline:none" ${p.role==='admin'&&p.id===S.user.id?'disabled':''}>
                <option value="admin" ${p.role==='admin'?'selected':''}>מנהל</option>
                <option value="parent" ${p.role==='parent'?'selected':''}>הורה</option>
                <option value="student" ${p.role==='student'?'selected':''}>תלמיד</option>
              </select>
            </td>
            <td>
              ${p.id===S.user.id?'<span style="font-size:.8rem;color:var(--lgt)">אתה</span>':`
              <button onclick="blockUser('${p.id}',${!isBlocked})" class="btn ${isBlocked?'btn-primary':'btn-ghost'}" style="font-size:.78rem;padding:5px 12px">
                ${isBlocked?'✓ בטל חסימה':'🔒 חסום'}
              </button>`}
            </td>
          </tr>`;}).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--lgt);padding:32px">אין משתמשים רשומים</td></tr>'}
        </tbody>
      </table>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h3 style="font-weight:700;margin-bottom:16px">שיוך הורה לתלמיד</h3>
    <p style="font-size:.83rem;color:var(--mid);margin-bottom:12px">לאחר שהורה נרשם — שייך אותו לתלמיד כדי שיראה את הנתונים שלו.</p>
    <div class="fg-row">
      <div class="fg"><label>תלמיד</label>
        <select id="linkSt">
          <option value="">בחר תלמיד</option>
          ${S.data.students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label>ID הורה (מהטבלה למעלה)</label>
        <input id="linkParent" placeholder="הדבק ID מעמודת 'מזהה משתמש' למעלה"/>
      </div>
    </div>
    <button class="btn btn-primary" onclick="linkParentToStudent()">שייך הורה לתלמיד</button>

    <div style="margin-top:20px;border-top:1px solid var(--brd);padding-top:16px">
      <h4 style="font-weight:700;margin-bottom:12px">שיוך תלמיד לחשבון</h4>
      <div class="fg-row">
        <div class="fg"><label>תלמיד</label>
          <select id="linkStSelf">
            <option value="">בחר תלמיד</option>
            ${S.data.students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
          </select>
        </div>
        <div class="fg"><label>ID משתמש (תלמיד)</label>
          <input id="linkStudentUser" placeholder="הדבק ID מעמודת 'מזהה משתמש' למעלה"/>
        </div>
      </div>
      <button class="btn btn-primary" onclick="linkStudentUser()">שייך תלמיד</button>
    </div>

async function changeRole(uid,role){
  const {error}=await sb.from('profiles').update({role}).eq('id',uid);
  if(error){toast('שגיאה: '+error.message,'error');return;}
  toast(`✓ תפקיד שונה ל${role==='admin'?'מנהל':role==='parent'?'הורה':'תלמיד'}`,'success');
}

async function blockUser(uid,block){
  const {error}=await sb.from('profiles').update({is_active:!block}).eq('id',uid);
  if(error){toast('שגיאה: '+error.message,'error');return;}
  toast(block?'🔒 המשתמש נחסם':'✓ החסימה בוטלה',block?'error':'success');
  await renderAccounts();
}

async function linkParentToStudent(){
  const sid=document.getElementById('linkSt').value;
  const pid=document.getElementById('linkParent').value.trim();
  if(!sid||!pid){toast('בחר תלמיד והזן ID הורה','error');return;}
  const {error}=await sb.from('students').update({parent_user_id:pid}).eq('id',sid);
  if(error){toast('שגיאה: '+error.message,'error');return;}
  toast('✓ הורה שויך לתלמיד','success');
}

async function linkStudentUser(){
  const sid=document.getElementById('linkStSelf').value;
  const uid=document.getElementById('linkStudentUser').value.trim();
  if(!sid||!uid){toast('בחר תלמיד והזן ID','error');return;}
  const {error}=await sb.from('students').update({user_id:uid}).eq('id',sid);
  if(error){toast('שגיאה: '+error.message,'error');return;}
  toast('✓ תלמיד שויך לחשבון','success');
}

function openInviteModal(){
  openModal(`
  <div class="modal-h">הזמן משתמש <button class="modal-close" onclick="closeModal()">×</button></div>
  <p style="font-size:.85rem;color:var(--mid);margin-bottom:20px;line-height:1.6">המשתמש יקבל אימייל עם קישור לאיפוס סיסמה. לאחר כניסה ראשונה יוכל להתחבר למערכת.</p>
  <div class="fg"><label>שם מלא</label><input id="invName" placeholder="שם פרטי ומשפחה"/></div>
  <div class="fg"><label>אימייל</label><input id="invEmail" type="email" placeholder="email@example.com"/></div>
  <div class="fg"><label>סיסמה זמנית</label>
    <div style="display:flex;gap:8px">
      <input id="invPwd" value="Shoreshim2025!" style="flex:1;padding:11px 14px;border:1.5px solid var(--brd);border-radius:10px;font-size:.9rem;outline:none"/>
      <button class="btn btn-ghost" onclick="document.getElementById('invPwd').select();document.execCommand('copy');toast('✓ הועתק','success')">📋</button>
    </div>
  </div>
  <div class="fg"><label>תפקיד</label>
    <select id="invRole">
      <option value="parent">הורה</option>
      <option value="student">תלמיד</option>
      <option value="admin">מנהל</option>
    </select>
  </div>
  <div style="display:flex;gap:10px;margin-top:8px">
    <button class="btn btn-primary" style="flex:1" onclick="createAccount()">צור חשבון</button>
    <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
  </div>`);
}

async function createAccount(){
  const name=document.getElementById('invName').value.trim();
  const email=document.getElementById('invEmail').value.trim();
  const pwd=document.getElementById('invPwd').value.trim();
  const role=document.getElementById('invRole').value;
  if(!name||!email||!pwd){toast('מלא את כל השדות','error');return;}

  // Create user via signUp (user gets email confirmation)
  const {data,error}=await sb.auth.signUp({
    email,password:pwd,
    options:{data:{full_name:name,role}}
  });
  if(error){toast('שגיאה: '+error.message,'error');return;}

  // Admin upsert overrides the trigger's default 'student' role — allowed via profile_admin_all RLS policy
  if(data.user){
    const {error:perr}=await sb.from('profiles').upsert({id:data.user.id,full_name:name,role,email,avatar_color:rndColor()},{onConflict:'id'});
    if(perr){toast('שגיאה בהגדרת תפקיד: '+perr.message,'error');console.warn(perr);}
  }

  closeModal();
  toast(`✓ חשבון נוצר! שלח את הסיסמה הזמנית: ${pwd}`,'success');
  setTimeout(()=>renderAccounts(),1200);
}

// ══════════════════════════════════════
//  PARENT PORTAL
// ══════════════════════════════════════
function renderParentDashboard(){
  const D=S.data;
  if(!D.children?.length){
    setPage('שלום!','');
    setContent(`<div class="empty"><div class="ei">👋</div><p>חשבונך עדיין לא שויך לילד. אנא פנה למנטור לידור לשיוך.</p></div>`);
    return;
  }
  const child=getActiveChild();
  const g=D.groups?.find(x=>x.id===child.group_id);
  const att=D.attendance.filter(a=>a.student_id===child.id);
  const rate=att.length?Math.round(att.filter(a=>a.present).length/att.length*100):0;
  const sc=avgScoreArr(att);
  const pres=att.filter(a=>a.present).length;

  setPage(`שלום ${S.profile.full_name?.split(' ')[0]||''}!`,`מעקב התקדמות — ${child.name}`);
  setContent(`
  ${childSelector()}
  <div class="parent-hero">
    <div style="font-size:.78rem;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.1em;margin-bottom:8px">תלמיד</div>
    <div class="parent-child-name">${child.name}</div>
    <div class="parent-child-group">קבוצה: ${g?.name||'—'} · כיתה: ${child.grade||'—'}</div>
    <div class="parent-stats">
      <div class="parent-stat"><div class="parent-stat-val" style="color:${rate<60?'#FF4D6D':rate<80?'#FF9A3C':'#C1FF00'}">${rate}%</div><div class="parent-stat-lbl">נוכחות</div></div>
      <div class="parent-stat"><div class="parent-stat-val">${sc??'—'}</div><div class="parent-stat-lbl">ציון ממוצע</div></div>
      <div class="parent-stat"><div class="parent-stat-val">${pres}</div><div class="parent-stat-lbl">שיעורים</div></div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <h3 style="font-size:.95rem;font-weight:700;margin-bottom:14px">📈 ציונים אחרונים</h3>
      <div class="chart-wrap"><canvas id="parentChart"></canvas></div>
    </div>
    <div class="card">
      <h3 style="font-size:.95rem;font-weight:700;margin-bottom:14px">📋 נוכחות אחרונה</h3>
      ${att.slice(-8).reverse().map(a=>{
        const l=D.lessons.find(x=>x.id===a.lesson_id);
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--brd)">
          <span style="font-size:.85rem">${fmt(l?.lesson_date)}</span>
          <span class="badge ${a.present?'badge-green':'badge-red'}">${a.present?'✓ נוכח':'✗ נעדר'}</span>
        </div>`;}).join('')||'<div class="empty"><p>אין נתונים</p></div>'}
    </div>
    <div class="card" style="grid-column:1/-1">
      <h3 style="font-size:.95rem;font-weight:700;margin-bottom:14px">📝 שיעורי הבית האחרונים</h3>
      ${att.filter(a=>a.homework).slice(-5).reverse().map(a=>{
        const l=D.lessons.find(x=>x.id===a.lesson_id);
        return`<div class="hw-item">
          <div class="hw-cb ${a.homework_done?'done':''}"></div>
          <div style="flex:1">
            <div class="hw-text ${a.homework_done?'done':''}">${a.homework}</div>
            <div class="hw-date">${fmt(l?.lesson_date)}</div>
          </div>
          <span class="badge ${a.homework_done?'badge-green':'badge-orange'}">${a.homework_done?'הוגש':'ממתין'}</span>
        </div>`;}).join('')||'<div class="empty"><p>אין שיעורי בית</p></div>'}
    </div>
  </div>`);

  const scores=att.filter(a=>a.score!=null).map(a=>({score:a.score,date:D.lessons.find(l=>l.id===a.lesson_id)?.lesson_date})).sort((a,b)=>a.date>b.date?1:-1).slice(-10);
  setTimeout(()=>{
    const ctx=document.getElementById('parentChart')?.getContext('2d');
    if(ctx&&scores.length){new Chart(ctx,{type:'line',data:{labels:scores.map(x=>fmt(x.date)),datasets:[{data:scores.map(x=>x.score),borderColor:'#3A5BF0',backgroundColor:'rgba(58,91,240,.1)',borderWidth:2,pointRadius:4,tension:.4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100}}}});}
  },100);
}

function avgScoreArr(att){
  const sc=att.filter(a=>a.score!=null).map(a=>a.score);
  return sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;
}

// ─── MULTI-CHILD SUPPORT ───
function getActiveChild(){
  const D=S.data;
  if(!D.children?.length) return null;
  return D.children.find(c=>c.id===S.activeChildId)||D.children[0];
}
function setActiveChild(id){
  S.activeChildId=id;
  loadParentData().then(()=>renderParentDashboard());
}
function childSelector(){
  const D=S.data;
  if(!D.children||D.children.length<=1) return '';
  const active=getActiveChild();
  return `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    ${D.children.map(c=>`<button onclick="setActiveChild('${c.id}')" class="btn btn-sm ${c.id===active?.id?'btn-primary':'btn-ghost'}">${c.name}</button>`).join('')}
  </div>`;
}

function renderParentAttendance(){
  const D=S.data;const child=getActiveChild();if(!child)return;
  const att=D.attendance.filter(a=>a.student_id===child.id);
  setPage('נוכחות',child.name);
  setContent(`${childSelector()}<div class="card">
    <div class="tbl-wrap"><table>
      <thead><tr><th>תאריך</th><th>קבוצה</th><th>נושא</th><th>נוכחות</th><th>ציון</th><th>הערה</th></tr></thead>
      <tbody>
        ${att.map(a=>{const l=D.lessons.find(x=>x.id===a.lesson_id);const g=D.groups?.find(x=>x.id===l?.group_id);
          return`<tr>
            <td>${fmt(l?.lesson_date)}</td><td>${g?.name||'—'}</td><td>${l?.topic||'—'}</td>
            <td><span class="badge ${a.present?'badge-green':'badge-red'}">${a.present?'✓ נוכח':'✗ נעדר'}</span></td>
            <td>${a.score!=null?`<strong>${a.score}</strong>`:'—'}</td>
            <td style="font-size:.82rem;color:var(--mid)">${a.notes||'—'}</td>
          </tr>`;}).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--lgt);padding:32px">אין נתונים</td></tr>'}
      </tbody>
    </table></div>
  </div>`);
}

function renderParentProgress(){
  const D=S.data;const child=getActiveChild();if(!child)return;
  const att=D.attendance.filter(a=>a.student_id===child.id);
  const scores=att.filter(a=>a.score!=null).map(a=>({score:a.score,date:D.lessons.find(l=>l.id===a.lesson_id)?.lesson_date})).sort((a,b)=>a.date>b.date?1:-1);
  setPage('התקדמות',child.name);
  setContent(`${childSelector()}<div class="card"><div class="chart-wrap" style="height:300px"><canvas id="progChart"></canvas></div></div>`);
  setTimeout(()=>{
    const ctx=document.getElementById('progChart')?.getContext('2d');
    if(ctx&&scores.length){new Chart(ctx,{type:'line',data:{labels:scores.map(x=>fmt(x.date)),datasets:[{label:'ציון',data:scores.map(x=>x.score),borderColor:'#3A5BF0',backgroundColor:'rgba(58,91,240,.1)',borderWidth:2,pointRadius:5,tension:.4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100}}}});}
  },100);
}

function renderParentHomework(){
  const D=S.data;const child=getActiveChild();if(!child)return;
  const att=D.attendance.filter(a=>a.student_id===child.id&&a.homework);
  setPage('שיעורי בית',child.name);
  setContent(`${childSelector()}<div class="card">
    ${att.reverse().map(a=>{const l=D.lessons.find(x=>x.id===a.lesson_id);
      return`<div class="hw-item">
        <div class="hw-cb ${a.homework_done?'done':''}"></div>
        <div style="flex:1"><div class="hw-text ${a.homework_done?'done':''}">${a.homework}</div><div class="hw-date">${fmt(l?.lesson_date)}</div></div>
        <span class="badge ${a.homework_done?'badge-green':'badge-orange'}">${a.homework_done?'✓ הוגש':'ממתין'}</span>
      </div>`;}).join('')||'<div class="empty"><div class="ei">📝</div><p>אין שיעורי בית</p></div>'}
  </div>`);
}

function renderParentReport(){
  const D=S.data;const child=getActiveChild();if(!child)return;
  setPage('דוח התקדמות',child.name);
  setContent(`<div class="card" style="text-align:center;padding:48px">
    <div style="font-size:3rem;margin-bottom:16px">📄</div>
    <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:8px">דוח התקדמות — ${child.name}</h2>
    <p style="color:var(--mid);margin-bottom:24px">הדוח נפתח בחלון חדש ומוכן להדפסה ושמירה כ-PDF.</p>
    <button class="btn btn-primary" onclick="genParentReport('${child.id}')">📄 הפק דוח</button>
  </div>`);
}

async function genParentReport(sid){
  if(!S.data.students){
    S.data.students=S.data.children||[];
    S.data.groups=S.data.groups||[];
    S.data.lessons=S.data.lessons||[];
  }
  genReport(sid, true); // הורה — ללא dialog מנטור
}
